<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup | Innovation University</title>
    <link rel="icon" type="image/png" href="../images/iu-logo.png" />
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body class="faculty-theme">
    <div id="preloader"><div class="spinner"></div></div>

    <a href="iu.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Faculty Site</a>

    <div class="auth-wrapper">
        <!-- Login Card -->
        <div class="auth-card animate-up" id="loginCard">
            <div style="text-align: center; margin-bottom: 20px;">
                <img src="../images/iu-logo.png" alt="IU Logo" style="width: 80px;">
            </div>
            <h2 class="auth-title">Welcome Back</h2>
            <form action="dashboard-STU.html">
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" placeholder="Username or Student ID" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-premium btn-accent" style="width: 100%;">Sign In</button>
                <div class="auth-switch">
                    New student? <a href="javascript:void(0)" onclick="toggleAuth()">Create an Account</a>
                </div>
            </form>
        </div>

        <!-- Register Card -->
        <div class="auth-card animate-up" id="registerCard" style="display: none;">
            <div style="text-align: center; margin-bottom: 20px;">
                <img src="../images/iu-logo.png" alt="IU Logo" style="width: 80px;">
            </div>
            <h2 class="auth-title">Student Registration</h2>
            <form action="#">
                <div class="input-group">
                    <i class="fa-solid fa-id-badge"></i>
                    <input type="text" placeholder="Full Academic Name" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" placeholder="University Email" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Secure Password" required>
                </div>
                <button type="submit" class="btn-premium btn-accent" style="width: 100%;">Register Now</button>
                <div class="auth-switch">
                    Already registered? <a href="javascript:void(0)" onclick="toggleAuth()">Return to Login</a>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/style.js"></script>
    <script>
        function toggleAuth() {
            const loginCard = document.getElementById('loginCard');
            const registerCard = document.getElementById('registerCard');

            if (loginCard.style.display === 'none') {
                loginCard.style.display = 'block';
                registerCard.style.display = 'none';
            } else {
                loginCard.style.display = 'none';
                registerCard.style.display = 'block';
            }
        }
    </script>
</body>
</html>
