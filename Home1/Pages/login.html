<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup | Innovation University</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body class="faculty-theme">

    <div id="preloader">
        <div class="spinner"></div>
    </div>

    <a href="iu.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Faculty Site</a>

    <div class="auth-wrapper">
        <!-- Login Card -->
        <div class="auth-card" id="loginCard">
            <h2 class="auth-title">Login</h2>
            <form action="dashboard-STU.html">
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-premium btn-accent" style="width: 100%;">Sign In</button>
                <div class="auth-switch">
                    Don't have an account? <a href="javascript:void(0)" onclick="toggleAuth()">Register Now</a>
                </div>
            </form>
        </div>

        <!-- Register Card -->
        <div class="auth-card" id="registerCard" style="display: none;">
            <h2 class="auth-title">Register</h2>
            <form action="#">
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" placeholder="Full Name" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-premium btn-accent" style="width: 100%;">Create Account</button>
                <div class="auth-switch">
                    Already have an account? <a href="javascript:void(0)" onclick="toggleAuth()">Log In</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Preloader
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            setTimeout(() => {
                preloader.style.opacity = '0';
                setTimeout(() => preloader.style.display = 'none', 500);
            }, 800);
        });

        // Toggle Auth Cards
        function toggleAuth() {
            const loginCard = document.getElementById('loginCard');
            const registerCard = document.getElementById('registerCard');

            if (loginCard.style.display === 'none') {
                loginCard.style.display = 'block';
                registerCard.style.display = 'none';
            } else {
                loginCard.style.display = 'none';
                registerCard.style.display = 'block';
            }
        }
    </script>

</body>

</html>
