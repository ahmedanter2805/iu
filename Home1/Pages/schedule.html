<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Schedule | Innovation University</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .filter-section { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; align-items: center; }
        .filter-section select { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: white; outline: none; }
        input[type="time"], input[placeholder="Subject"], input[placeholder="e.g. 2h"] { background: transparent; border: none; color: white; text-align: center; width: 100%; outline: none; }
        select { background: transparent; border: none; color: white; text-align-last: center; width: 100%; outline: none; cursor: pointer; }
        option { background: var(--primary); color: white; }
    </style>
</head>
<body class="lms-theme">

<div id="preloader"><div class="spinner"></div></div>

<header>
    <div class="nav-container">
        <div class="logo">
            <img src="../images/iu-logo.png" alt="IU Logo">
            <span>IU | Student Portal</span>
        </div>
        <div class="menu-icon" id="menuToggle"><i class="fas fa-bars"></i></div>
        <nav id="navMenu">
            <a href="iu.html">Home</a>
            <a href="dashboard-STU.html">Dashboard</a>
            <a href="schedule.html" class="active">Schedule</a>
            <a href="login.html" class="btn-premium btn-accent">Logout <i class="fas fa-sign-out-alt"></i></a>
        </nav>
    </div>
</header>

<main class="main-content">
    <h1 class="text-gold" style="text-align: center; margin-bottom: 30px;">Study Schedule</h1>

    <div class="grid-stats">
        <div class="glass-card stat-card">
            <div class="stat-info"><h3>Subjects</h3><div class="value" id="subCount">0</div></div>
            <div class="icon-box"><i class="fas fa-book"></i></div>
        </div>
        <div class="glass-card stat-card">
            <div class="stat-info"><h3>Total Duration</h3><div class="value" id="totalDuration">0h</div></div>
            <div class="icon-box"><i class="fas fa-clock"></i></div>
        </div>
        <div class="glass-card stat-card">
            <div class="stat-info"><h3>Completed</h3><div class="value" id="statusCount">0</div></div>
            <div class="icon-box"><i class="fas fa-check-circle"></i></div>
        </div>
    </div>

    <div class="glass-card section-card">
        <div class="filter-section">
            <select id="filter-day">
                <option value="">All Days</option>
                <option>Sunday</option><option>Monday</option><option>Tuesday</option>
                <option>Wednesday</option><option>Thursday</option><option>Friday</option>
                <option>Saturday</option>
            </select>
            <select id="filter-status">
                <option value="">All Status</option>
                <option>Completed</option><option>In Progress</option><option>Not Started</option>
            </select>
            <button class="btn-premium btn-accent" style="padding: 8px 15px;" onclick="addRow()">+ Add Subject</button>
            <button class="btn-premium btn-primary" style="padding: 8px 15px;" onclick="autoFill()">Auto-Fill</button>
            <button class="btn-premium btn-primary" style="padding: 8px 15px;" onclick="window.print()">🖨 Print</button>
        </div>

        <div class="table-responsive">
            <table id="scheduleTable">
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Day</th>
                        <th>Time</th>
                        <th>Duration</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>Progress</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div class="glass-card section-card" style="margin-top: 30px;">
        <h3 class="section-title-icon"><i class="fas fa-chart-line"></i> Weekly Study Hours</h3>
        <canvas id="studyChart" style="max-height: 250px;"></canvas>
    </div>
</main>

<footer>© 2026 Innovation University — All Rights Reserved. Built for Excellence.</footer>

<script>
    // Preloader
    window.addEventListener('load', () => {
        const preloader = document.getElementById('preloader');
        setTimeout(() => {
            preloader.style.opacity = '0';
            setTimeout(() => preloader.style.display = 'none', 500);
        }, 800);
    });

    // Chart
    const ctx = document.getElementById('studyChart').getContext('2d');
    let studyChart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Hours', data: [], borderColor: '#FFD700', backgroundColor: 'rgba(255, 215, 0, 0.1)', fill: true, tension: 0.4 }] },
        options: { 
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { 
                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#fff' } },
                x: { grid: { display: false }, ticks: { color: '#fff' } }
            }
        }
    });

    // Core Logic
    document.addEventListener("DOMContentLoaded", loadFromStorage);

    function addRow(subject = "", day = "", time = "", duration = "", priority = "Medium", status = "Not Started") {
        const tbody = document.querySelector("#scheduleTable tbody");
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td><input value="${subject}" placeholder="Subject"></td>
            <td><select>
                <option>Select Day</option>
                ${["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"].map(d => `<option ${d === day ? "selected" : ""}>${d}</option>`).join("")}
            </select></td>
            <td><input type="time" value="${time}"></td>
            <td><input placeholder="e.g. 2h" value="${duration}"></td>
            <td><select>${["High", "Medium", "Low"].map(p => `<option ${p === priority ? "selected" : ""}>${p}</option>`).join("")}</select></td>
            <td><select>${["Not Started", "In Progress", "Completed"].map(s => `<option ${s === status ? "selected" : ""}>${s}</option>`).join("")}</select></td>
            <td>
                <div class="progress-bar"><div class="progress-fill" style="width:${getProgressValue(status)}%"></div></div>
            </td>
            <td>
                <button class="btn-premium btn-primary" style="padding: 5px 10px;" onclick="deleteRow(this)">🗑</button>
            </td>
        `;
        tbody.appendChild(tr);
        tr.querySelectorAll("input, select").forEach(el => el.addEventListener("change", saveSchedule));
        updateSummary();
    }

    function deleteRow(btn) { btn.closest("tr").remove(); saveSchedule(); }

    function getProgressValue(status) {
        if (status === "Not Started") return 0;
        if (status === "In Progress") return 50;
        if (status === "Completed") return 100;
        return 0;
    }

    function updateSummary() {
        const rows = [...document.querySelectorAll("#scheduleTable tbody tr")];
        document.getElementById("subCount").innerText = rows.length;
        let totalH = 0, completed = 0, chartLabels = [], chartData = [];
        rows.forEach(tr => {
            const dur = tr.querySelector("td:nth-child(4) input").value;
            if (dur.match(/\d+/)) totalH += parseInt(dur.match(/\d+/)[0]);
            const status = tr.querySelector("td:nth-child(6) select").value;
            if (status === "Completed") completed++;
            tr.querySelector(".progress-fill").style.width = getProgressValue(status) + "%";
            chartLabels.push(tr.querySelector("td:nth-child(1) input").value || "...");
            chartData.push(dur.match(/\d+/) ? parseInt(dur.match(/\d+/)[0]) : 0);
        });
        document.getElementById("totalDuration").innerText = totalH + "h";
        document.getElementById("statusCount").innerText = completed;
        studyChart.data.labels = chartLabels;
        studyChart.data.datasets[0].data = chartData;
        studyChart.update();
    }

    function saveSchedule() {
        const rows = [...document.querySelectorAll("#scheduleTable tbody tr")].map(tr => ({
            subject: tr.querySelector("td:nth-child(1) input").value,
            day: tr.querySelector("td:nth-child(2) select").value,
            time: tr.querySelector("td:nth-child(3) input").value,
            duration: tr.querySelector("td:nth-child(4) input").value,
            priority: tr.querySelector("td:nth-child(5) select").value,
            status: tr.querySelector("td:nth-child(6) select").value
        }));
        localStorage.setItem("StudyScheduleData", JSON.stringify(rows));
        updateSummary();
    }

    function loadFromStorage() {
        const saved = JSON.parse(localStorage.getItem("StudyScheduleData") || "[]");
        if(saved.length === 0) {
            addRow("Web Development", "Sunday", "09:00", "2h", "High", "In Progress");
        } else {
            saved.forEach(r => addRow(r.subject, r.day, r.time, r.duration, r.priority, r.status));
        }
        updateSummary();
    }

    function autoFill() {
        const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        document.querySelectorAll("#scheduleTable tbody tr").forEach((tr, i) => {
            tr.querySelector("td:nth-child(2) select").value = days[i % 7];
            tr.querySelector("td:nth-child(3) input").value = "10:00";
        });
        saveSchedule();
    }

    // Filters
    document.getElementById("filter-day").addEventListener("change", applyFilters);
    document.getElementById("filter-status").addEventListener("change", applyFilters);

    function applyFilters() {
        const day = document.getElementById("filter-day").value;
        const status = document.getElementById("filter-status").value;
        document.querySelectorAll("#scheduleTable tbody tr").forEach(tr => {
            const tDay = tr.querySelector("td:nth-child(2) select").value;
            const tStatus = tr.querySelector("td:nth-child(6) select").value;
            tr.style.display = ((!day || tDay === day) && (!status || tStatus === status)) ? "" : "none";
        });
    }
</script>
</body>
</html>
