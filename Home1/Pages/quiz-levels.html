<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Levels</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../images/iu-logo.png" />
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 50px 20px;
      text-align: center;
      overflow-x: hidden;
      background: #071a2f;
    }

    /* Background Blur */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url('../images/img.jpg') center/cover no-repeat;
      filter: blur(6px) brightness(0.7);
      transform: scale(1.1);
      z-index: -1;
    }

    /* Title */
    h1 {
      font-size: 42px;
      color: #dce6ea;
      text-shadow: 0 0 5px #00e1ff, 0 0 3px #00e1ff;
      margin-bottom: 44px;
      animation: fadeDown 1s ease;
    }

    /* Back Button */
    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 8px 18px;
      border-radius: 50px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(6px);
      color: #7fdcff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 300px);
      justify-content: center;
      gap: 40px;
      max-width: 900px;
      margin: auto;
    }

    /* Glass Card */
    .card {
      background: rgba(227, 206, 206, 0.08);
      backdrop-filter: blur(14px);
      border-radius: 2px;
      padding: 28px;
      border: 1px solid #00e1ff;
      box-shadow: 0 0 10px #50eaff;
      transition: 0.35s;
      opacity: 0;
      transform: translateY(40px);
      animation: fadeUp 0.8s ease forwards;
    }

    .card:nth-child(2) {
      animation-delay: .1s
    }

    .card:nth-child(3) {
      animation-delay: .2s
    }

    .card:nth-child(4) {
      animation-delay: .3s
    }

    .card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 0 25px rgba(0, 200, 255, 0.5);
    }

    /* Neon Icon Circle */
    .icon-circle {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 15px;
      font-size: 30px;
      color: #7fdcff;
      background: rgba(0, 0, 0, 0.35);
      box-shadow:
        0 0 10px #00c3ff,
        0 0 20px #00c3ff,
        inset 0 0 10px rgba(0, 195, 255, 0.5);
      transition: 0.3s;
    }

    .card:hover .icon-circle {
      box-shadow:
        0 0 20px #00e1ff,
        0 0 40px #00e1ff,
        inset 0 0 12px rgba(0, 225, 255, 0.7);
      transform: scale(1.1);
    }

    /* Level Title */
    .card h3 {
      font-size: 22px;
      color: #dff5ff;
      margin-bottom: 12px;
    }

    /* Button Neon */
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border-radius: 12px;
      background: rgba(0, 222, 252, 0.73);
      color: #004964;
      border: 1px solid rgba(0, 58, 74, 0.4);
      font-weight: 600;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: rgba(0, 195, 255, 0.39);
      color: #00111a;
      box-shadow: 0 0 15px #00c3ff, 0 0 30px #00c3ff;
    }

    /* Animations */
    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive */
    @media(max-width:700px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="back-btn" onclick="goBack()">← Back</div>

  <h1>Quiz Levels</h1>

  <div class="grid">

    <!-- Level 1 -->
    <div class="card">
      <div class="icon-circle"><i class="fa-solid fa-1"></i></div>
      <h3>Level 1</h3>
      <a href="./levels-term1/level1-quizzes.html" class="btn">Open</a>
    </div>

    <!-- Level 2 -->
    <div class="card">
      <div class="icon-circle"><i class="fa-solid fa-2"></i></div>
      <h3>Level 2</h3>
      <a href="./level2-term1.html/level2-quizzes.html" class="btn">Open</a>
    </div>

    <!-- Level 3 -->
    <div class="card">
      <div class="icon-circle"><i class="fa-solid fa-3"></i></div>
      <h3>Level 3</h3>
      <a href="level3-term1/level3-quizzes.html" class="btn">Open</a>
    </div>

    <!-- Level 4 -->
    <div class="card">
      <div class="icon-circle"><i class="fa-solid fa-4"></i></div>
      <h3>Level 4</h3>
      <a href="level4-term1/level4-quizzes.html" class="btn">Open</a>
    </div>

  </div>

  <script>
    function goBack() {
      window.location.href = "dashboard-STU.html";   // غيريها لو عايزة
    }
  </script>

</body>

</html>
