<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Select Level</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
 <link rel="icon" type="image/png" href="../images/iu-logo.png" />
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      text-align: center;
      padding: 50px 20px;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url('images/img.jpg') center/cover no-repeat;
      filter: blur(3px);
      transform: scale(1.1);
      z-index: -1;
    }

    h1 {
      font-size: 42px;
      color: #0a3d62;
      margin-bottom: 25px;
      text-shadow: 0 0 9px #ffffff;
    }

    .term-switch {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 40px;
    }

    .term-switch button {
      padding: 10px 30px;
      border-radius: 30px;
      border: 2px solid #0a3d62;
      background: transparent;
      color: #0a3d62;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.5s ease;
    }

    .term-switch button.active {
      background: #0a3d62;
      color: white;
      transform: scale(1.05);
      box-shadow: 0 0px 9px rgba(255, 255, 255, 0.92);
    }

    .term-switch button:hover:not(.disabled) {
      transform: scale(1.22);
      background-color: rgb(0, 66, 146);
      color: #fff;
    }

    .term-switch button.disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #comingSoonMsg {
      margin-top: 10px;
      font-size: 13px;
      color: #555;
      opacity: 0;
      transform: translateY(-5px);
      transition: 0.4s ease;
      pointer-events: none;
    }

    #comingSoonMsg.show {
      opacity: 1;
      transform: translateY(0);
    }

    .courses-container {
      display: grid;
      grid-template-columns: repeat(2, 320px);
      gap: 35px;
      justify-content: center;
      animation: fadeSlide 0.6s ease;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .course-card {
      background: rgba(255, 255, 255, 0.21);
      backdrop-filter: blur(23px);
      border-radius: 13px;
      padding: 27px 20px;
      box-shadow: 0 0px 12px #00467a;
      border: 1px solid rgb(142, 142, 142);
      transition: 0.4s;
    }

    .course-card:hover { transform: translateY(-10px); }

    .course-card h3 {
      font-size: 24px;
      color: #00406e;
      margin-bottom: 10px;
      border-bottom: 1px solid #0a3d62;
      padding-bottom: 8px;
    }

    .course-card p { font-size: 16px; color: #003c67; margin-bottom: 18px; }

    .buttons-container { display: flex; gap: 15px; }

    .buttons-container button {
      flex: 1;
      border: none;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      cursor: pointer;
      transition: 0.3s;
    }

    .pdf-btn { background: #044e83; }
    .video-btn { background: #b60011; }

    .buttons-container button:hover { transform: scale(1.05); }

    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 8px 18px;
      border-radius: 50px;
      background: #003c68;
      font-weight: 600;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.81);
    }

    @media (max-width: 700px) {
      .courses-container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="back-btn" onclick="goHome()">← Back</div>

  <h1>Select Your Level</h1>

  <div class="term-switch">
    <button id="term1Btn" class="active" onclick="switchTerm('term1')">Term 1</button>
    <button id="term2Btn" class="disabled" onclick="switchTerm('term2')">
      <i class="fa-solid fa-lock"></i> Term 2
    </button>
    <div id="comingSoonMsg">Coming Soon</div>
  </div>

  <div class="courses-container" id="courses">

    <div class="course-card">
      <h3>Level 1</h3>
      <p>First Year Courses</p>
      <div class="buttons-container">
        <button class="pdf-btn" onclick="openPDF(1)"> <i class="fa-regular fa-file-pdf"></i> Open PDF </button>
        <button class="video-btn" onclick="openVideo(1)"> <i class="fa-solid fa-circle-play"></i> Open Video </button>
      </div>
    </div>

    <div class="course-card">
      <h3>Level 2</h3>
      <p>Second Year Courses</p>
      <div class="buttons-container">
        <button class="pdf-btn" onclick="openPDF(2)"> <i class="fa-regular fa-file-pdf"></i> Open PDF </button>
        <button class="video-btn" onclick="openVideo(2)"> <i class="fa-solid fa-circle-play"></i> Open Video </button>
      </div>
    </div>  

    <div class="course-card">
      <h3>Level 3</h3>
      <p>Third Year Courses</p>
      <div class="buttons-container">
        <button class="pdf-btn" onclick="openPDF(3)"> <i class="fa-regular fa-file-pdf"></i> Open PDF </button>
        <button class="video-btn" onclick="openVideo(3)"> <i class="fa-solid fa-circle-play"></i> Open Video </button>
      </div>
    </div>

    <div class="course-card">
      <h3>Level 4</h3>
      <p>Fourth Year Courses</p>
      <div class="buttons-container">
        <button class="pdf-btn" onclick="openPDF(4)"> <i class="fa-regular fa-file-pdf"></i> Open PDF </button>
        <button class="video-btn" onclick="openVideo(4)"> <i class="fa-solid fa-circle-play"></i> Open Video </button>
      </div>
    </div>

  </div>

  <script>
    // ----------------------------------------------------
    // ملفات كل مستوى لكل ترم
    // ----------------------------------------------------
const files = {
  term1: {
    // المستوى الأول: الملفات موجودة في المجلد الرئيسي بجانب select-level.html
    1: { 
      pdf: 'levels-term1/level1-term1-pdf.html', 
      video: 'levels-term1/level1-term1-video.html' 
    },
    // المستوى الثاني: المجلد اسمه "level2-term1.html"
    2: { 
      pdf: 'level2-term1.html/level2-term1-pdf.html', 
      video: 'level2-term1.html/level2-term1-video.html' 
    },
    // المستوى الثالث: المجلد اسمه "level3-term1"
    3: { 
      pdf: 'level3-term1/level3-term1-pdf.html', 
      video: 'level3-term1/level3-term1-video.html' 
    },
    // المستوى الرابع: المجلد اسمه "level4-term1-" (تأكد من الشرطة الأخيرة)
   4: { 
      pdf: 'level4-term1/level4-term1-pdf.html', 
      video: 'level4-term1/level4-term1-video.html' 
    }
  },
  term2: {
    
    // أبقها فارغة حالياً ليظهر رسالة "Coming Soon" عند الضغط عليها
    1: { pdf: 'level1/term2/pdf.html', video: 'level1/term2/video.html' },
    2: { pdf: 'level2/term2/pdf.html', video: 'level2/term2/video.html' },
    3: { pdf: 'level3/term2/pdf.html', video: 'level3/term2/video.html' },
    4: { pdf: 'level4/term2/pdf.html', video: 'level4/term2/video.html' },
  }
};

    let currentTerm = 'term1';
    const term1Btn = document.getElementById('term1Btn');
    const term2Btn = document.getElementById('term2Btn');

    // تفعيل ترم 2 تلقائيًا عند وجود ملفات
    function checkTermAvailability() {
      if (files['term2']) {
        const hasFiles = Object.values(files['term2']).some(f => f.pdf && f.video);
        if (hasFiles) term2Btn.classList.remove('disabled');
      }
    }
    checkTermAvailability();

    function switchTerm(term) {
      if(term === 'term2' && term2Btn.classList.contains('disabled')) {
        showComingSoon();
        return;
      }
      currentTerm = term;
      term1Btn.classList.toggle('active', term==='term1');
      term2Btn.classList.toggle('active', term==='term2');
    }

    function openPDF(level) {
      if(files[currentTerm] && files[currentTerm][level] && files[currentTerm][level].pdf) {
        window.location.href = files[currentTerm][level].pdf;
      } else {
        showComingSoon();
      }
    }

    function openVideo(level) {
      if(files[currentTerm] && files[currentTerm][level] && files[currentTerm][level].video) {
        window.location.href = files[currentTerm][level].video;
      } else {
        showComingSoon();
      }
    }

    function goHome() {
      window.location.href = "iu.html";
    }

    function showComingSoon() {
      const msg = document.getElementById("comingSoonMsg");
      msg.classList.add("show");
      setTimeout(() => msg.classList.remove("show"), 2500);
    }
  </script>
</body>
</html>
