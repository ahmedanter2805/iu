<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Schedule</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="../images/iu-logo.png" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: rgba(103, 105, 111, 0.03);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
           background: url('images/img.jpg') center/cover no-repeat;
            filter: blur(4px);
            transform: scale(1.1);
            z-index: -1;
        }

        header {
            padding: 18px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 40, 130, 0.9);
            box-shadow: 0 2px 10px white;
        }

        header h2 {
            margin: 0;
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
        }

        nav a {
            margin-left: 20px;
            text-decoration: none;
            color: white;
            font-weight: 600;
        }

        nav a:hover {
            color: #000000;
        }

        .container {
            max-width: 1000px;
            background: rgba(129, 129, 129, 0.34);
            margin: 42px auto;
            padding: 30px;
            border-radius: 34px;
            box-shadow: 0 4px 15px rgba(0, 40, 130, 0.9);
        }


        h1 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 26px;
            font-size: 37px;
        }

        /* Search + Filter */
        .controls {
            display: flex;
            justify-content: center;
            gap: 23px;
            margin-bottom: 10px;
        }

        .controls input,
        .controls select {
            padding: 10px;
            width: 250px;
            border-radius: 8px;
            border: 1px solid #000000;
            font-size: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 18px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 38, 124, 0.9);
        }

        th {
            background: rgba(0, 40, 130, 0.76);
            color: white;
            padding: 18px;
            font-size: 18px;
            text-align: center;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #f7e1e1;
            font-size: 17px;
        }

        tr:hover td {
            background: rgba(5, 36, 104, 0.4);
        }

        .btn {
            display: block;
            width: 250px;
            margin: 25px auto;
            padding: 12px;
            background: rgba(0, 40, 130, 0.61);
            color: #ffffff;
            border: none;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
        }

        .btn:hover {
            background: rgba(0, 40, 130, 0.81);
        }

        .no-data {
            text-align: center;
            padding: 25px;
            color: rgba(174, 174, 174, 0.95);
            font-size: 20px;
            font-weight: 600;
        }
    </style>

</head>

<body>

    <header>
        <h2>IU University</h2>

        <nav>
            <a href="iu.html">Home</a>
            <a href="schedule.html">Schedule</a>
            <a href="quiz.html">Quiz</a>
        </nav>
    </header>


    <div class="container">

        <h1>Saved Schedule</h1>

        <!-- Search + Filter -->
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search...">

            <select id="filterDay">
                <option value="">Filter by Day</option>
                <option>Sunday</option>
                <option>Monday</option>
                <option>Tuesday</option>
                <option>Wednesday</option>
                <option>Thursday</option>
                <option>Friday</option>
                <option>Saturday</option>
            </select>
        </div>

        <table id="savedTable">
            <thead>
                <tr>
                    <th>Subject</th>
                    <th>Day</th>
                    <th>Date</th>
                    <th>Time</th>
                </tr>
            </thead>

            <tbody></tbody>
        </table>

        <div id="noData" class="no-data" style="display:none;">
            No saved schedule found.
        </div>

        <button href="schedule.html" class="btn" onclick="goBack()">⬅ Back to Schedule</button>
    </div>


    <script>

        document.addEventListener("DOMContentLoaded", () => {
            loadSavedSchedule();

            document.getElementById("searchInput").addEventListener("input", filterTable);
            document.getElementById("filterDay").addEventListener("change", filterTable);
        });


        function loadSavedSchedule() {
            const saved = JSON.parse(localStorage.getItem("StudyScheduleData") || "[]");
            const tbody = document.querySelector("#savedTable tbody");
            const noData = document.getElementById("noData");

            if (saved.length === 0) {
                noData.style.display = "block";
                return;
            }

            saved.forEach(row => {
                const tr = document.createElement("tr");

                tr.innerHTML = `
            <td>${row.subject || "-"}</td>
            <td>${row.day || "-"}</td>
            <td>${row.date || "-"}</td>
            <td>${row.time || "-"}</td>
        `;

                tbody.appendChild(tr);
            });
        }



        function filterTable() {
            const search = document.getElementById("searchInput").value.toLowerCase();
            const filterDay = document.getElementById("filterDay").value;
            const rows = document.querySelectorAll("#savedTable tbody tr");

            rows.forEach(row => {
                const cells = row.querySelectorAll("td");
                const [subject, day, date, time] = [...cells].map(td => td.textContent.toLowerCase());

                const matchesSearch =
                    subject.includes(search) ||
                    day.includes(search) ||
                    date.includes(search) ||
                    time.includes(search);

                const matchesDay = filterDay === "" || day === filterDay.toLowerCase();

                if (matchesSearch && matchesDay) {
                    row.style.display = "";
                } else {
                    row.style.display = "none";
                }
            });
        }



        function goBack() {
            window.location.href = "schedule.html";
        }

    </script>

</body>

</html>
