<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parallel Computing Quizzes</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --neon-blue:#00c3ff;
  --neon-dark:#071a2f;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  min-height:100vh;
  display:flex;
  color:rgb(255, 255, 255);
  overflow-x:hidden;
  background: var(--neon-dark);
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url('../../../../images/img.jpg') center/cover no-repeat;
  filter:blur(6px) brightness(0.8);
  transform:scale(1.1);
  z-index:-1;
}

.sidebar{
  width:220px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(12px);
  border-right:1px solid rgba(255,255,255,0.1);
  padding:20px;
  box-sizing:border-box;
}
.sidebar h2{text-align:center;margin-bottom:20px;font-size:20px;color:#7fdcff;}
.sidebar ul{list-style:none;padding:0;}
.sidebar li{
  margin:15px 0;
  cursor:pointer;
  padding:8px 10px;
  border-radius:8px;
  transition:0.3s;
}
.sidebar li:hover, .sidebar li.active{
  background:rgba(127,220,255,0.2);
  color:#00c3ff;
}

.main{
  flex:1;
  padding:40px;
  box-sizing:border-box;
}
.main h1{
  text-align:center;
  margin-bottom:25px;
  font-size:28px;
  color:rgb(255, 255, 255);
}

.quiz-card{
  background:rgba(255, 255, 255, 0.16);
  backdrop-filter:blur(12px);
  border-radius:18px;
  padding:25px;
  margin-top:20px;
  border:1px solid rgba(0, 195, 255, 0.73);
  box-shadow:0 0 5px #29aad2;
  max-width:915px;
  margin-left:auto;
  margin-right:auto;
}

.quiz-header span{ color: #7fdcff; font-weight:600; letter-spacing:1px; }
.quiz-header h3{ color:#dff5ff; margin-top:5px; font-weight:700; }

.progress { background: rgba(255,255,255,0.2); border-radius:20px; height:10px; margin:15px 0; }
.progress-bar { display:block; height:100%; background:linear-gradient(90deg,#00c3ff,#008cff); transition:0.3s; }

.question-count{ font-size:14px; color:#7fdcff; margin-bottom:10px; }
.option{
  border: 1.5px solid rgba(255,255,255,0.3);
  padding:12px 14px;
  border-radius:12px;
  margin-bottom:12px;
  cursor:pointer;
  transition:0.3s;
  display:block;
}
.option:hover{ background: rgba(0,195,255,0.1); border-color: var(--neon-blue); }
.option input{ margin-right:10px; }

.btn-next, .back-btn, .btn-secondary{
  background: var(--neon-blue);
  color:#00111a;
  border-radius:30px;
  padding:10px 20px;
  font-weight:600;
  border:none;
  cursor:pointer;
  margin-top:10px;
}
.btn-next:hover, .back-btn:hover, .btn-secondary:hover{
  background:#00f0ff;
  color:#000;
}

.correct { background-color: #d4edda; color: green; font-weight:bold; padding:8px; border-radius:6px; margin-bottom:5px; }
.wrong { background-color: #f8d7da; color: red; font-weight:bold; padding:8px; border-radius:6px; margin-bottom:5px; }
.explanation{ font-style:italic; color:#7fdcff; margin-top:5px; }

.back-btn-fixed{
  position:fixed;
  top:15px;
  right:15px;
  padding:8px 18px;
  border-radius:50px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(6px);
  color:#7fdcff;
  border:1px solid rgba(255,255,255,0.2);
  cursor:pointer;
  z-index:1000;
  transition:0.3s;
}
.back-btn-fixed:hover{ background:rgba(0,195,255,0.2); color:#00c3ff; }

@media(max-width:800px){
  body{flex-direction:column;}
  .sidebar{width:100%;display:flex;overflow-x:auto;padding:10px;}
  .sidebar ul{display:flex;}
  .sidebar li{margin:0 10px;}
  .main{padding:20px;}
}
</style>
</head>
<body>

<div class="back-btn-fixed" onclick="goToLevels()">🏠 Back </div>

<div class="sidebar">
  <h2>Parallel Computing</h2>
  <ul id="quizList">
    <li class="active" onclick="showQuiz(0)">Quiz 1</li>
    <li onclick="showQuiz(1)">Quiz 2</li>
    <li onclick="showQuiz(2)">Quiz 3</li>
    <li onclick="showQuiz(3)">Quiz 4</li>
    <li onclick="showQuiz(4)">Quiz 5</li>
  </ul>
</div>

<div class="main">
  <h1 id="quizTitle">Quiz 1</h1>
  <div class="quiz-card" id="quizContent"></div>
</div>

<script type="application/json" id="quiz-data">
[
  {"question":"What is parallel computing?","options":["Single processor computation","Simultaneous computation on multiple processors","Using one core at high speed","Cloud-based computing"],"answer":1,"explanation":"Parallel computing involves multiple processors working simultaneously."},
  {"question":"Which model is used in parallel computing?","options":["Shared Memory","Single-threaded","Batch Processing","None"],"answer":0,"explanation":"Shared memory model is commonly used for parallel computing."},
  {"question":"Amdahl’s Law is related to:","options":["Sequential speedup","Parallel performance limits","Hardware cost","Networking speed"],"answer":1,"explanation":"Amdahl’s Law predicts the theoretical maximum speedup of parallel programs."},
  {"question":"Which is a parallel computing hardware?","options":["CPU","GPU","Hard Drive","Monitor"],"answer":1,"explanation":"GPU is designed for parallel computations."},
  {"question":"What is a speedup in parallel computing?","options":["Time to run sequentially","Performance improvement using parallelism","Number of processors used","Data transfer rate"],"answer":1,"explanation":"Speedup measures performance improvement when using multiple processors."}
]
</script>

<script>
let quiz = JSON.parse(document.getElementById('quiz-data').textContent);
let currentQuestion = 0;
let userAnswers = [];

const quizContent = document.getElementById('quizContent');

function goToLevels(){ window.location.href="../../level4-quizzes.html"; }

function showQuiz(index){
  currentQuestion = 0;
  userAnswers = [];
  document.querySelectorAll('.sidebar li').forEach(li=>li.classList.remove('active'));
  document.querySelectorAll('.sidebar li')[index].classList.add('active');
  document.getElementById('quizTitle').innerText = 'Quiz ' + (index+1);
  loadQuestion();
}

function loadQuestion(){
  const q = quiz[currentQuestion];
  document.getElementById("quizTitle").innerText = `Quiz ${currentQuestion+1}`;
  
  let html = `<div class="quiz-header"><span>INNOVATION UNIVERSITY</span><h3>Parallel Computing – Quiz</h3></div>`;
  html += `<div class="progress"><div class="progress-bar" style="width:${((currentQuestion+1)/quiz.length)*100}%"></div></div>`;
  html += `<div class="question-count">Question ${currentQuestion+1} of ${quiz.length}</div>`;
  html += `<h5>${q.question}</h5>`;
  q.options.forEach((opt,i)=>{
    let checked = userAnswers[currentQuestion]===i?"checked":"";
    html += `<label class="option"><input type="radio" name="option" value="${i}" ${checked}> ${opt}</label>`;
  });
  html += `<button class="btn-next w-100 mt-3" onclick="nextQuestion()">${currentQuestion===quiz.length-1?'Finish Quiz':'Next Question'}</button>`;
  if(currentQuestion>0) html += `<button class="btn-next w-100 mt-2" onclick="prevQuestion()">Back Question</button>`;
  
  quizContent.innerHTML = html;
}

function nextQuestion(){
  const selected = document.querySelector('input[name="option"]:checked');
  if(!selected){ alert("Please select an answer"); return; }
  userAnswers[currentQuestion] = parseInt(selected.value);
  if(currentQuestion<quiz.length-1){ currentQuestion++; loadQuestion(); } 
  else { showResult(); }
}

function prevQuestion(){
  if(currentQuestion>0){ currentQuestion--; loadQuestion(); }
}

function showResult(){
  let score = 0;
  userAnswers.forEach((ans,i)=>{ if(ans===quiz[i].answer) score++; });
  let status = score/quiz.length>=0.5?`<span class="pass">PASS</span>`:`<span class="fail">FAIL</span>`;
  quizContent.innerHTML = `
    <div class="result text-center p-4" style="background: rgba(255,255,255,0.3); border-radius: 18px; backdrop-filter: blur(20px);">
      <h2>Quiz Completed</h2>
      <p>Your Score: <span style="font-size:32px;">${score} / ${quiz.length}</span></p>
      <p>${status}</p>
      <button class="btn-next mt-2" onclick="reviewAnswers()">Review Answers</button>
      <button class="btn-secondary mt-2" onclick="showQuiz(0)">Retake Quiz</button>
    </div>
  `;
}

function reviewAnswers(){
  let html = `<h3 class="mb-4 text-center">Review Answers</h3>`;
  quiz.forEach((q,i)=>{
    html += `<div class="border p-3 mb-3 rounded"><h6>Q${i+1}. ${q.question}</h6>`;
    q.options.forEach((opt,j)=>{
      let cls="", icon="";
      if(j===q.answer){ cls="correct"; icon=" ✅"; }
      if(userAnswers[i]===j && j!==q.answer){ cls="wrong"; icon=" ❌"; }
      html += `<div class="${cls}">${opt}${icon}</div>`;
    });
    html += `<div class="explanation"><b>Explanation:</b> ${q.explanation}</div></div>`;
  });
  html += `<div class="text-center mt-3">
    <button class="btn-next" onclick="showQuiz(0)">Retake Quiz</button>
    <button class="btn-next ms-2" onclick="goToLevels()">Back to Parallel Computing</button>
  </div>`;
  quizContent.innerHTML = html;
}

showQuiz(0);
</script>
</body>
</html>
