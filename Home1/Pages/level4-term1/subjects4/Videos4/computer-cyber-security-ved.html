<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Computer and Cyber Security</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: rgba(143, 143, 143, 0.33);
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url('../../../../images/img.jpg') center / cover no-repeat;
    filter: blur(3px);
    transform: scale(1.1);
    z-index: -1;
}

header {
    padding: 18px 60px;
    background: rgba(0, 26, 85, 0.9);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h2 {
    color: white;
    margin: 0;
}

nav a {
    margin-left: 20px;
    text-decoration: none;
    color: white;
    font-weight: 600;
}

.container {
    max-width: 1200px;
    margin: 40px auto;
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 30px;
}

/* Sidebar */
.sidebar {
    background: rgba(206, 206, 206, 0.25);
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 4px 15px rgb(0, 26, 85);
}

.sidebar h3 {
    text-align: center;
    color: rgba(13, 42, 107, 0.9);
    margin-top: 0;
}

.lesson {
    padding: 10px;
    margin-bottom: 8px;
    background: rgba(7, 36, 102, 0.9);
    color: white;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
    font-size: 14px;
}

.lesson:hover {
    background: #002e94;
    transform: scale(1.03);
}

/* Content */
.content {
    background: rgba(215, 215, 215, 0.5);
    border-radius: 15px;
    padding: 25px;
    min-height: 400px;
    box-shadow: 0 0px 16px rgba(0, 33, 107, 0.85);
}

iframe {
    width: 100%;
    height: 420px;
    border-radius: 12px;
}

.placeholder {
    text-align: center;
    color: #555;
    font-size: 18px;
    margin-top: 140px;
}

@media (max-width: 900px) {
    .container {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<header>
    <h2>Innovation University</h2>
    <nav>
               <a href="../quizzes4/computer-cyber-security-quiz.html">Quiz</a>
               <a href="../../level4-term1-video.html">Courses</a>
               <a href="../../level4-term1-pdf.html">PDF</a>
               <a href="../../../iu.html">Home</a>
    </nav>
</header>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar" id="lessonList">
        <h3>Computer &amp; Cyber Security</h3>
    </div>

    <!-- Content -->
    <div class="content" id="content">
        <div class="placeholder">
            🔐 Select a lecture to start learning Cyber Security
        </div>
    </div>

</div>

<script>
const lectures = [
    {
        title: "Lecture 1 – Introduction to Cyber Security",
        video: "https://www.youtube.com/embed/inWWhr5tnEA",
        desc: "Basic concepts of cyber security, threats, and attacks."
    },
    {
        title: "Lecture 2 – Types of Cyber Attacks",
        video: "https://www.youtube.com/embed/2LaAJq1lB1Q",
        desc: "Malware, phishing, ransomware, and denial of service attacks."
    },
    {
        title: "Lecture 3 – Network Security",
        video: "https://www.youtube.com/embed/9u0wz8M0KcY",
        desc: "Firewalls, IDS/IPS, and securing computer networks."
    },
    {
        title: "Lecture 4 – Cryptography Basics",
        video: "https://www.youtube.com/embed/jhXCTbFnK8o",
        desc: "Encryption, decryption, and secure communication."
    },
    {
        title: "Lecture 5 – Cyber Security Best Practices",
        video: "https://www.youtube.com/embed/7R0zZC0bZ0Q",
        desc: "Security policies, risk management, and future challenges."
    }
];

const lessonList = document.getElementById("lessonList");

lectures.forEach((lec, index) => {
    const div = document.createElement("div");
    div.className = "lesson";
    div.textContent = lec.title;
    div.onclick = () => loadLecture(index);
    lessonList.appendChild(div);
});

function loadLecture(i) {
    const lec = lectures[i];
    document.getElementById("content").innerHTML = `
        <h3>${lec.title}</h3>
        <iframe src="${lec.video}" allowfullscreen></iframe>
        <p style="margin-top:15px;">${lec.desc}</p>
    `;
}
</script>

</body>
</html>
