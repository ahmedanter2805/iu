<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Theoretical Computer Science</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ===== SAME STYLE ===== */

body{
margin:0;
font-family:'Inter',sans-serif;
background:rgba(143,143,143,.33)
}

body::before{
content:"";
position:fixed;
inset:0;
background:url('../../../images/img.jpg') center/cover no-repeat;
filter:blur(3px);
transform:scale(1.1);
z-index:-1
}

header{
padding:18px 60px;
background:rgba(0,26,85,.9);
display:flex;
justify-content:space-between;
align-items:center
}

header h2{
color:white;
margin:0
}

nav a{
margin-left:20px;
text-decoration:none;
color:#fff;
font-weight:600
}

.container{
max-width:1200px;
margin:40px auto;
display:grid;
grid-template-columns:300px 1fr;
gap:30px
}

.sidebar{
background:rgba(206,206,206,.23);
border-radius:15px;
padding:12px;
box-shadow:0 4px 15px rgb(0,26,85)
}

.sidebar h3{
text-align:center;
color:rgba(13,42,107,.85)
}

.lecture-item{
padding:10px;
margin-bottom:8px;
background:rgba(7,36,102,.9);
color:white;
border-radius:8px;
cursor:pointer;
transition:.3s;
font-size:14px
}

.lecture-item:hover{
background:#002e94;
transform:scale(1.03)
}
.content{
background:rgba(215,215,215,.48);
border-radius:15px;
padding:30px;
min-height:350px;
box-shadow:0 0 16px rgba(0,33,107,.85)
}
.placeholder{
text-align:center;
color:#555;
font-size:18px;
margin-top:120px
}
</style>
</head>

<body>
<header>
<h2>Innovation University</h2>
<nav>
  <a href="./quizzes3/theoretical-cs-quiz.html">Quiz</a>
     <a href="../level3-term1-pdf.html">Courses</a>
        <a href="../level3-term1-video.html">Videos</a>
        <a href="../../iu.html">Home</a>
</nav>
</header>

<div class="container">
<div class="sidebar">
<h3>Theoretical CS</h3>
<div class="lecture-item" onclick="showLecture(0)">Lecture 1 – Introduction</div>
<div class="lecture-item" onclick="showLecture(1)">Lecture 2 – Automata</div>
<div class="lecture-item" onclick="showLecture(2)">Lecture 3 – Formal Languages</div>
<div class="lecture-item" onclick="showLecture(3)">Lecture 4 – Turing Machines</div>
<div class="lecture-item" onclick="showLecture(4)">Lecture 5 – Computability</div>
</div>

<div class="content" id="content">
<div class="placeholder">📘 Select a lecture</div>
</div>
</div>

<script>
const lectures=[
{title:"Introduction to TCS",content:"Overview of theoretical foundations of computer science."},
{title:"Automata Theory",content:"Finite automata and state machines."},
{title:"Formal Languages",content:"Grammar and language classifications."},
{title:"Turing Machines",content:"Basic model of computation."},
{title:"Computability Theory",content:"What problems computers can solve."}
];
function showLecture(i){
content.innerHTML=`<h1>${lectures[i].title}</h1><p>${lectures[i].content}</p>`;
}
</script>
</body>
</html>
