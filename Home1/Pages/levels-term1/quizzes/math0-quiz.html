<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math 0 Quizzes</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --neon-blue:#00c3ff;
  --neon-dark:#071a2f;
}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  min-height:100vh;
  display:flex;
  color:#fff;
  background: var(--neon-dark);
  overflow-x:hidden;
}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:rgba(143,143,143,.33)
    }
    
body::before{
    content:"";position:fixed;
    inset:0;
    background:url('../../../images/img.jpg') center/cover no-repeat;
    filter:blur(3px);
    transform:scale(1.1);
    z-index:-1
    }
.sidebar{
  width:220px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(12px);
  border-right:1px solid rgba(255,255,255,0.1);
  padding:20px;
}
.sidebar h2{text-align:center;color:#7fdcff;}
.sidebar li{
  margin:12px 0;
  cursor:pointer;
  padding:8px;
  border-radius:8px;
  transition:.3s;
}
.sidebar li:hover,.sidebar li.active{
  background:rgba(127,220,255,0.2);
  color:#00c3ff;
}
.main{flex:1;padding:40px;}
.quiz-card{
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(14px);
  border-radius:18px;
  padding:25px;
  border:1px solid rgba(0,195,255,0.6);
  box-shadow:0 0 10px #00c3ff55;
  max-width:900px;
  margin:auto;
}
.progress{
  background:rgba(255,255,255,0.2);
  height:10px;
  border-radius:20px;
  margin:15px 0;
}
.progress-bar{
  height:100%;
  background:linear-gradient(90deg,#00c3ff,#008cff);
  border-radius:20px;
}
.option{
  display:block;
  border:1px solid rgba(255,255,255,0.3);
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
  transition:.3s;
}
.option:hover{
  background:rgba(0,195,255,0.12);
  border-color:#00c3ff;
}
.btn{
  background:#00c3ff;
  border:none;
  padding:10px 20px;
  border-radius:25px;
  cursor:pointer;
  font-weight:600;
  margin-top:10px;
}
.btn:hover{background:#00e0ff;}
.correct{background:#d4edda;color:green;padding:6px;border-radius:6px;}
.wrong{background:#f8d7da;color:red;padding:6px;border-radius:6px;}
  .back-btn-fixed{
  position:fixed;
  top:15px;
  right:15px;
  padding:8px 18px;
  border-radius:50px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(6px);
  color:#7fdcff;
  border:1px solid rgba(255,255,255,0.2);
  cursor:pointer;
  z-index:1000;
  transition:0.3s;
}
.back-btn-fixed:hover{ background:rgba(0,195,255,0.2); color:#00c3ff; }
</style>
</head>

<body>

<div class="sidebar">
  <h2>Math 0</h2>
  <ul id="quizList">
    <li class="active" onclick="showQuiz(0)">Quiz 1</li>
    <li onclick="showQuiz(1)">Quiz 2</li>
    <li onclick="showQuiz(2)">Quiz 3</li>
    <li onclick="showQuiz(3)">Quiz 4</li>
    <li onclick="showQuiz(4)">Quiz 5</li>
    <li onclick="showQuiz(5)">Quiz 6</li>
    <li onclick="showQuiz(6)">Quiz 7</li>
    <li onclick="showQuiz(7)">Quiz 8</li>
    <li onclick="showQuiz(8)">Quiz 9</li>
    <li onclick="showQuiz(9)">Quiz 10</li>
  </ul>
</div>
<div class="back-btn-fixed" onclick="goToLevels()">🏠 Back </div>

<div class="main">
  <h1>Math 0</h1>
  <div class="quiz-card" id="quizContent"></div>
</div>

<script>
const quizzes = [
[
{q:"2 + 3 = ?",o:["4","5","6","7"],a:1,e:"2+3=5"},
{q:"5 × 2 = ?",o:["7","10","12","8"],a:1,e:"5×2=10"},
{q:"10 ÷ 2 = ?",o:["2","3","5","6"],a:2,e:"10÷2=5"}
],
[
{q:"Square of 4?",o:["8","16","12","10"],a:1,e:"4²=16"},
{q:"Cube of 2?",o:["6","8","4","2"],a:1,e:"2³=8"},
{q:"√9 = ?",o:["2","4","3","5"],a:2,e:"√9=3"}
],
[
{q:"Even number?",o:["3","5","8","7"],a:2,e:"8 even"},
{q:"Odd number?",o:["4","6","9","8"],a:2,e:"9 odd"},
{q:"Prime number?",o:["4","6","7","8"],a:2,e:"7 prime"}
],
[
{q:"15 + 10 = ?",o:["20","25","30","10"],a:1,e:"25"},
{q:"20 − 5 = ?",o:["10","15","20","25"],a:1,e:"15"},
{q:"6 × 3 = ?",o:["12","18","21","24"],a:1,e:"18"}
],
[
{q:"Fraction 1/2 = ?",o:["0.5","1","2","0.2"],a:0,e:"0.5"},
{q:"1/4 = ?",o:["0.25","0.5","1","2"],a:0,e:"0.25"},
{q:"3/3 = ?",o:["1","3","0","2"],a:0,e:"1"}
],
[
{q:"10% of 100?",o:["5","10","20","50"],a:1,e:"10"},
{q:"50% of 20?",o:["5","10","20","15"],a:1,e:"10"},
{q:"25% of 40?",o:["5","10","20","15"],a:1,e:"10"}
],
[
{q:"Perimeter of square side 4?",o:["8","12","16","20"],a:2,e:"4×4=16"},
{q:"Area of square side 5?",o:["10","20","25","30"],a:2,e:"5×5=25"},
{q:"Triangle sides?",o:["2","3","4","5"],a:1,e:"Triangle has 3"}
],
[
{q:"100 − 40 = ?",o:["50","60","70","80"],a:1,e:"60"},
{q:"9 × 9 = ?",o:["72","81","90","99"],a:1,e:"81"},
{q:"81 ÷ 9 = ?",o:["7","8","9","10"],a:2,e:"9"}
],
[
{q:"Next after 10?",o:["9","11","12","8"],a:1,e:"11"},
{q:"Before 20?",o:["18","19","21","22"],a:1,e:"19"},
{q:"Largest?",o:["5","9","3","7"],a:1,e:"9"}
],
[
{q:"Math helps in?",o:["Logic","Sleep","None","Noise"],a:0,e:"Math improves logic"},
{q:"0 × 5 = ?",o:["0","5","10","1"],a:0,e:"0"},
{q:"1 + 0 = ?",o:["0","1","2","3"],a:1,e:"1"}
]
];

let qi=0,qq=0,ans=[];

function showQuiz(i){
qi=i;qq=0;ans=[];
document.querySelectorAll("#quizList li").forEach(li=>li.classList.remove("active"));
document.querySelectorAll("#quizList li")[i].classList.add("active");
loadQ();
}

function loadQ(){
const q=quizzes[qi][qq];
let h=`<div class="progress"><div class="progress-bar" style="width:${((qq+1)/3)*100}%"></div></div>`;
h+=`<h3>Question ${qq+1}</h3><h4>${q.q}</h4>`;
q.o.forEach((o,i)=>h+=`<label class="option"><input type="radio" name="o" value="${i}"> ${o}</label>`);
h+=`<button class="btn" onclick="nextQ()">${qq==2?'Finish':'Next'}</button>`;
quizContent.innerHTML=h;
}

function nextQ(){
const s=document.querySelector('input[name="o"]:checked');
if(!s){alert("Choose answer");return;}
ans[qq]=+s.value;
if(qq<2){qq++;loadQ();}else result();
}

function result(){
let sc=0;
quizzes[qi].forEach((q,i)=>{if(ans[i]==q.a)sc++;});
quizContent.innerHTML=`<h2>Quiz Completed</h2><h3>Score: ${sc}/3</h3>
<button class="btn" onclick="review()">Review</button>
<button class="btn" onclick="showQuiz(${qi})">Retake</button>`;
}

function review(){
let h="<h2>Review</h2>";
quizzes[qi].forEach((q,i)=>{
h+=`<h4>${q.q}</h4>`;
q.o.forEach((o,j)=>{
let c="";
if(j==q.a)c="correct";
if(ans[i]==j&&j!=q.a)c="wrong";
h+=`<div class="${c}">${o}</div>`;
});
h+=`<p><i>${q.e}</i></p><hr>`;
});
quizContent.innerHTML=h;
}
function goToLevels(){ window.location.href="../level1-quizzes.html"; }

showQuiz(0);
</script>

</body>
</html>-
