<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Physics Quizzes</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  display:flex;
  min-height:100vh;
  background:#071a2f;
  color:#fff;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url('../../../images/img.jpg') center/cover no-repeat;
  filter:blur(5px) brightness(0.8);
  z-index:-1;
}

/* Sidebar */
.sidebar{
  width:230px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  padding:20px;
}
.sidebar h2{text-align:center;color:#7fdcff;}
.sidebar ul{list-style:none;padding:0;}
.sidebar li{
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  cursor:pointer;
}
.sidebar li:hover,.active{
  background:rgba(0,195,255,0.2);
  color:#00c3ff;
}

/* Main */
.main{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* Quiz Card */
.quiz-card{
  width:100%;
  max-width:720px;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(25px);
  border-radius:18px;
  padding:25px;
  box-shadow:0 0 15px rgba(0,195,255,0.4);
}

/* Title above card */
.quiz-title{
  text-align:center;
  margin-bottom:10px;
  font-weight:700;
  color:#7fdcff;
}

/* Options */
.option{
  display:block;
  border:1px solid rgba(255,255,255,0.3);
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
}
.option:hover{background:rgba(0,195,255,0.1);}

/* Buttons */
button{
  border:none;
  padding:10px;
  border-radius:25px;
  font-weight:600;
  cursor:pointer;
  margin-top:10px;
}
    .back-btn-fixed{
  position:fixed;
  top:15px;
  right:15px;
  padding:8px 18px;
  border-radius:50px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(6px);
  color:#7fdcff;
  border:1px solid rgba(255,255,255,0.2);
  cursor:pointer;
  z-index:1000;
  transition:0.3s;
}
.btn-next{background:#00c3ff;color:#00111a;width:100%;}
.btn-next:hover{background:#00f0ff;}
.back-btn{background:#555;color:#fff;width:100%;}
.back-btn:hover{background:#777;}

.pass{color:#00ff9d;font-weight:bold;}
.fail{color:#ff4d4d;font-weight:bold;}

.correct{background:#d4edda;color:green;padding:6px;border-radius:6px;margin:3px 0;}
.wrong{background:#f8d7da;color:red;padding:6px;border-radius:6px;margin:3px 0;}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>Physics Quizzes</h2>
  <ul id="quizList"></ul>
</div>

<!-- Main -->
<div class="main">
  <div class="quiz-card">
    <div class="quiz-title" id="quizTitle">Quiz 1</div>
    <div id="quizCard"></div>
  </div>
</div>
<div class="back-btn-fixed" onclick="goToLevels()">🏠 Back </div>

<script>

/* ===== QUIZ DATA (your Physics quiz) ===== */
const physicsQuiz = [
{"question":"What is the acceleration due to gravity on Earth?","options":["9.8 m/s²","10 m/s²","9.0 m/s²","8.5 m/s²"],"answer":0},
{"question":"Which of the following is a vector quantity?","options":["Speed","Mass","Velocity","Temperature"],"answer":2},
{"question":"Newton's third law states:","options":["F=ma","Every action has an equal and opposite reaction","Energy cannot be created","Force is proportional to displacement"],"answer":1},
{"question":"The unit of force is:","options":["Joule","Newton","Watt","Pascal"],"answer":1},
{"question":"What is the formula for kinetic energy?","options":["KE=1/2 mv²","KE=mv","KE=mgh","KE=mg"],"answer":0}
];

/* make 10 quizzes */
const quizzes = Array(10).fill(physicsQuiz);

let currentQuiz=0;
let currentQuestion=0;
let userAnswers=[];
let score=0;

/* ===== SIDEBAR ===== */
const list=document.getElementById("quizList");
for(let i=0;i<10;i++){
  let li=document.createElement("li");
  li.innerText="Quiz "+(i+1);
  li.onclick=()=>loadQuiz(i);
  if(i===0) li.classList.add("active");
  list.appendChild(li);
}

/* ===== LOAD QUIZ ===== */
function loadQuiz(index){
  currentQuiz=index;
  currentQuestion=0;
  userAnswers=[];
  document.getElementById("quizTitle").innerText="Quiz "+(index+1);

  document.querySelectorAll("#quizList li").forEach(li=>li.classList.remove("active"));
  document.querySelectorAll("#quizList li")[index].classList.add("active");

  loadQuestion();
}

/* ===== LOAD QUESTION ===== */
function loadQuestion(){
  const q=quizzes[currentQuiz][currentQuestion];

  let html=`
    <p>Question ${currentQuestion+1} of ${quizzes[currentQuiz].length}</p>
    <h4>${q.question}</h4>
  `;

  q.options.forEach((opt,i)=>{
    let checked=userAnswers[currentQuestion]===i?"checked":"";
    html+=`
      <label class="option">
        <input type="radio" name="option" value="${i}" ${checked}> ${opt}
      </label>`;
  });

  html+=`
    <button class="btn-next" onclick="nextQuestion()">
      ${currentQuestion===quizzes[currentQuiz].length-1?"Finish Quiz":"Next"}
    </button>
    <button class="back-btn" onclick="prevQuestion()">Back</button>
  `;

  document.getElementById("quizCard").innerHTML=html;
}

/* ===== NEXT ===== */
function nextQuestion(){
  const selected=document.querySelector('input[name="option"]:checked');
  if(!selected){alert("Select answer");return;}

  userAnswers[currentQuestion]=parseInt(selected.value);

  if(currentQuestion<quizzes[currentQuiz].length-1){
    currentQuestion++;
    loadQuestion();
  }else{
    calculateScore();
  }
}

/* ===== BACK ===== */
function prevQuestion(){
  if(currentQuestion>0){
    currentQuestion--;
    loadQuestion();
  }
}

/* ===== SCORE ===== */
function calculateScore(){
  score=0;
  userAnswers.forEach((ans,i)=>{
    if(ans===quizzes[currentQuiz][i].answer) score++;
  });
  showResult();
}

/* ===== RESULT ===== */
function showResult(){
  let total=quizzes[currentQuiz].length;
  let status=score/total>=0.5?'<span class="pass">PASS</span>':'<span class="fail">FAIL</span>';

  document.getElementById("quizCard").innerHTML=`
    <h2>Quiz Completed</h2>
    <p>Score: ${score} / ${total}</p>
    <p>${status}</p>
    <button class="btn-next" onclick="loadQuiz(${currentQuiz})">Retake Quiz</button>
  `;
}
function goToLevels(){ window.location.href="../level1-quizzes.html"; }
/* START */
loadQuiz(0);

</script>

</body>
</html>
