<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Human Rights Videos</title>
<link href="../../../css/bootstrap.min.css" rel="stylesheet">

<style>
/* ======= KEEP BACKGROUND ======= */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url('../../../images/img.jpg') no-repeat center center;
    background-size: cover;
    filter: blur(5px);
    transform: scale(1.1);
    z-index: -1;
}

header {
    padding: 18px 60px;
    background: rgba(0, 26, 85, 0.9);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h2 {
    color: white;
    margin: 0;
}

nav a {
    margin-left: 20px;
    text-decoration: none;
    color: #ffffff;
    font-weight: 600;
}

/* ======= LAYOUT ======= */
.main-layout {
    max-width: 1300px;
    margin: 120px auto 50px;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 25px;
}

/* ======= SIDEBAR ======= */
.sidebar {
    background: rgba(194, 194, 194, 0.49);
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 4px 15px rgb(0, 20, 66);
}

.lesson {
    padding: 12px;
    margin-bottom: 8px;
    background: #002b5b;
    color: #ffffff;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
}

.lesson:hover {
    background: rgba(0, 43, 91, 0.82);
}

/* ======= CONTENT ======= */
.content {
    background: rgba(183, 183, 183, 0.52);
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 4px 15px rgb(0, 20, 66);
}

iframe {
    width: 100%;
    height: 420px;
    border-radius: 12px;
}

.placeholder {
    text-align: center;
    color: #555;
    margin-top: 150px;
    font-size: 18px;
}
</style>
</head>

<body>

<!-- ======= HEADER ======= -->
<header>
    <h2>Innovation University</h2>
    <nav>
         <a href="../quizzes/human-rights-quiz.html">quiz</a>
        <a href="../level1-term1-video.html">Courses</a>
        <a href="../level1-term1-pdf.html">PDF</a>
          <a href="../../iu.html">Home</a>
    </nav>
</header>

<!-- ======= MAIN ======= -->
<div class="main-layout">

    <!-- Sidebar -->
    <div class="sidebar" id="lessonList">
        <h5 class="mb-3">Human Rights Lectures</h5>
    </div>

    <!-- Content -->
    <div class="content" id="content">
        <div class="placeholder">
            ▶ Select a lecture to watch
        </div>
    </div>

</div>

<!-- ======= JS ======= -->
<script>
const lectures = [
{
    title: "01 Introduction to Human Rights",
    video: "https://www.youtube.com/embed/7Jv5D8p7K6k",
    desc: "Overview of human rights concepts, history, and importance."
},
{
    title: "02 Universal Declaration of Human Rights",
    video: "https://www.youtube.com/embed/svE5b8Zz4eU",
    desc: "Understanding the Universal Declaration of Human Rights (UDHR)."
},
{
    title: "03 Civil and Political Rights",
    video: "https://www.youtube.com/embed/Q0Z9rK6E5Gk",
    desc: "Rights related to freedom, equality, and political participation."
},
{
    title: "04 Economic, Social & Cultural Rights",
    video: "https://www.youtube.com/embed/3Z6HkP9Y7Rk",
    desc: "Rights related to education, health, and social welfare."
},
{
    title: "05 Human Rights & Law",
    video: "https://www.youtube.com/embed/Z4K8P6rE2kU",
    desc: "Relationship between human rights and national/international law."
},
{
    title: "06 Women's & Children's Rights",
    video: "https://www.youtube.com/embed/9H7Kp3E5R6M",
    desc: "Protection and empowerment of women and children."
},
{
    title: "07 Human Rights Violations",
    video: "https://www.youtube.com/embed/R9K5Z7H6P2E",
    desc: "Common forms of human rights violations and global challenges."
},
{
    title: "08 Human Rights Organizations",
    video: "https://www.youtube.com/embed/K6H9R3Z5P7Y",
    desc: "Role of international and local human rights organizations."
},
{
    title: "09 Human Rights in the Digital Age",
    video: "https://www.youtube.com/embed/5R6K7P9Z3Hk",
    desc: "Human rights issues related to technology and digital privacy."
}
];

const lessonList = document.getElementById("lessonList");

lectures.forEach((lec, index) => {
    const div = document.createElement("div");
    div.className = "lesson";
    div.textContent = lec.title;
    div.onclick = () => loadLecture(index);
    lessonList.appendChild(div);
});

function loadLecture(i) {
    const lec = lectures[i];
    document.getElementById("content").innerHTML = `
        <h3>${lec.title}</h3>
        <iframe src="${lec.video}" allowfullscreen></iframe>
        <p class="mt-3">${lec.desc}</p>
    `;
}
</script>

</body>
</html>
