<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Entrepreneurship &amp; Innovation Videos</title>
<link href="../../../css/bootstrap.min.css" rel="stylesheet">

<style>
/* ======= KEEP BACKGROUND ======= */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url('../../../images/img.jpg') no-repeat center center;
    background-size: cover;
    filter: blur(5px);
    transform: scale(1.1);
    z-index: -1;
}

header {
    padding: 18px 60px;
    background: rgba(0, 26, 85, 0.9);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h2 {
    color: white;
    margin: 0;
}

nav a {
    margin-left: 20px;
    text-decoration: none;
    color: #ffffff;
    font-weight: 600;
}

/* ======= LAYOUT ======= */
.main-layout {
    max-width: 1300px;
    margin: 120px auto 50px;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 25px;
}

/* ======= SIDEBAR ======= */
.sidebar {
    background: rgba(194, 194, 194, 0.49);
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 4px 15px rgb(0, 20, 66);
}

.lesson {
    padding: 12px;
    margin-bottom: 8px;
    background: #002b5b;
    color: #ffffff;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
}

.lesson:hover {
    background: rgba(0, 43, 91, 0.82);
}

/* ======= CONTENT ======= */
.content {
    background: rgba(183, 183, 183, 0.52);
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 4px 15px rgb(0, 20, 66);
}

iframe {
    width: 100%;
    height: 420px;
    border-radius: 12px;
}

.placeholder {
    text-align: center;
    color: #555;
    margin-top: 150px;
    font-size: 18px;
}
</style>
</head>

<body>

<!-- ======= HEADER ======= -->
<header>
    <h2>Innovation University</h2>
    <nav>
       <a href="../quizzes/enterprenurship-quiz.html">quiz</a>
       <a href="../level1-term1-video.html">Courses</a>
        <a href="../level1-term1-pdf.html">PDF</a>
        <a href="../../iu.html">Home</a>
    </nav>
</header>

<!-- ======= MAIN ======= -->
<div class="main-layout">

    <!-- Sidebar -->
    <div class="sidebar" id="lessonList">
        <h5 class="mb-3">Entrepreneurship &amp; Innovation</h5>
    </div>

    <!-- Content -->
    <div class="content" id="content">
        <div class="placeholder">
            ▶ Select a lecture to watch
        </div>
    </div>

</div>

<!-- ======= JS ======= -->
<script>
const lectures = [
{
    title: "01 Introduction to Entrepreneurship",
    video: "https://www.youtube.com/embed/6n5RZKxPp7A",
    desc: "Overview of entrepreneurship, innovation, and business mindset."
},
{
    title: "02 Entrepreneurial Mindset",
    video: "https://www.youtube.com/embed/V8rZ9kZ6J0A",
    desc: "Understanding creativity, risk-taking, and opportunity recognition."
},
{
    title: "03 Innovation & Creativity",
    video: "https://www.youtube.com/embed/9Ew3H6kYz0A",
    desc: "How innovative ideas are generated and developed."
},
{
    title: "04 From Idea to Startup",
    video: "https://www.youtube.com/embed/xYqQ8R7FZzA",
    desc: "Turning ideas into viable startup projects."
},
{
    title: "05 Business Models",
    video: "https://www.youtube.com/embed/Ip1S8yY6X2M",
    desc: "Introduction to business models and value proposition."
},
{
    title: "06 Market Analysis",
    video: "https://www.youtube.com/embed/5Z9HqL2pZ8A",
    desc: "Understanding customers, market needs, and competitors."
},
{
    title: "07 Funding & Finance Basics",
    video: "https://www.youtube.com/embed/4R9xQZ6H2YQ",
    desc: "Basic financial concepts and startup funding options."
},
{
    title: "08 Leadership & Teamwork",
    video: "https://www.youtube.com/embed/kP6ZxR8Y7ZQ",
    desc: "Building effective teams and leadership skills."
},
{
    title: "09 Pitching & Presentation Skills",
    video: "https://www.youtube.com/embed/W6R9xY2H7P8",
    desc: "How to pitch ideas clearly and confidently."
}
];

const lessonList = document.getElementById("lessonList");

lectures.forEach((lec, index) => {
    const div = document.createElement("div");
    div.className = "lesson";
    div.textContent = lec.title;
    div.onclick = () => loadLecture(index);
    lessonList.appendChild(div);
});

function loadLecture(i) {
    const lec = lectures[i];
    document.getElementById("content").innerHTML = `
        <h3>${lec.title}</h3>
        <iframe src="${lec.video}" allowfullscreen></iframe>
        <p class="mt-3">${lec.desc}</p>
    `;
}
</script>

</body>
</html>
