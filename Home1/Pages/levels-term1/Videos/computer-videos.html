<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Introduction to Computers</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="../../../css/bootstrap.min.css" rel="stylesheet">

<style>
/* ======= BACKGROUND ======= */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url('../../../images/img.jpg') no-repeat center center;
    background-size: cover;
    filter: blur(5px);
    transform: scale(1.1);
    z-index: -1;
}

/* ======= HEADER ======= */
header {
    padding: 18px 60px;
    background: rgba(0, 26, 85, 0.9);
    display: flex;
    justify-content: space-between;
    align-items: center;
}
header h2 {
    color: white;
    margin: 0;
}
    
nav a {
    margin-left: 20px;
    text-decoration: none;
    color: #ffffff;
    font-weight: 600;
}

/* ======= MAIN LAYOUT ======= */
.main-layout {
    max-width: 1300px;
    margin: 120px auto 50px;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 25px;
}

/* ======= SIDEBAR ======= */
.sidebar {
    background: rgba(194, 194, 194, 0.49);
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 4px 15px rgb(0, 20, 66);
}
.lesson {
    padding: 12px;
    margin-bottom: 8px;
    background: #002b5b;
    color: #ffffff;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    text-align: left;
}
.lesson:hover {
    background: rgba(0, 43, 91, 0.82);
}

/* ======= CONTENT ======= */
.content {
    background: rgba(183, 183, 183, 0.52);
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 4px 15px rgb(0, 20, 66);
}
iframe {
    width: 100%;
    height: 420px;
    border-radius: 12px;
}
.placeholder {
    text-align: center;
    color: #555;
    margin-top: 150px;
    font-size: 18px;
}
</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<header>
    <h2>Innovation University</h2>
    <nav>
        <a href="../quizzes/computer-quiz.html">quiz</a>
        <a href="../level1-term1-video.html">Courses</a>
        <a href="../level1-term1-pdf.html">PDF</a>
        <a href="../../iu.html">Home</a>
    </nav>
</header>

<!-- ===== MAIN LAYOUT ===== -->
<div class="main-layout">

    <!-- Sidebar -->
    <div class="sidebar">
        <h5 class="mb-3">Computer Videos</h5>

        <!-- كل فيديو كـ div مع data attributes -->
        <div class="lesson" data-video="https://www.youtube.com/embed/4hBdtutGw-k" data-desc="Introduction to Computers: Chapter 1. Basic Concepts of Computer.">
            Chapter 1 – Basic Concepts of Computer
        </div>

        <div class="lesson" data-video="https://www.youtube.com/embed/yzrgEXDa3Po" data-desc="Introduction to Computers: Chapter 1. Basic Concepts of Computer. Part2">
            Chapter 1 – Basic Concepts (Part 2)
        </div>

        <div class="lesson" data-video="https://www.youtube.com/embed/1NQkegC39cE" data-desc="Introduction to Computers: Chapter 2. Computer Hardware.">
            Chapter  2 – Computer Hardware
        </div>

        <div class="lesson" data-video="https://www.youtube.com/embed/Qy8SNWlQP9Q" data-desc="Introduction to Computers: Chapter 2 Part 2. Computer Hardware - INPUT Devices.">
            Input Devices
        </div>

        <div class="lesson" data-video="https://www.youtube.com/embed/NTuH2B5kykM" data-desc="Introduction to Computers: Chapter 2 Part 3. Computer Hardware - OUTPUT Devices.">
            Output Devices
        </div>

        <div class="lesson" data-video="https://www.youtube.com/embed/w7S1iqSslMk" data-desc="Introduction to Computers: Chapter 2 Part 4. Computer Hardware - Storage Devices.">
            Storage Devices
        </div>

        <div class="lesson" data-video="https://www.youtube.com/embed/K1BXyCICvpo" data-desc="Introduction to Computers: Chapter 3. Computer Software.">
            Computer Software
        </div>

        <div class="lesson" data-video="https://www.youtube.com/embed/K1BXyCICvpo" data-desc="Introduction to Computers: Chapter 4. Flowcharts.">
            Flowcharts
        </div>

        <div class="lesson" data-video="https://www.youtube.com/embed/_goCkdgNYko" data-desc="Introduction to Computers: Chapter 5. Numbering System. Binary, Octal, Hexadecimal, Decimal.">
            Numbering System
        </div>

    </div>

    <!-- Content -->
    <div class="content" id="content">
        <div class="placeholder">
            ▶ Select a video to watch
        </div>
    </div>

</div>

<!-- ===== JS ===== -->
<script>
const lessons = document.querySelectorAll('.lesson');
const content = document.getElementById('content');

lessons.forEach(lesson => {
    lesson.addEventListener('click', () => {
        const video = lesson.getAttribute('data-video');
        const desc = lesson.getAttribute('data-desc');
        const title = lesson.textContent;
        content.innerHTML = `
            <h3>${title}</h3>
            <iframe src="${video}" allowfullscreen></iframe>
            <p class="mt-3">${desc}</p>
        `;
    });
});
</script>

</body>
</html>
