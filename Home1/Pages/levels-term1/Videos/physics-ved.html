<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Physics Videos</title>
<link href="../../../css/bootstrap.min.css" rel="stylesheet">

<style>
/* ======= KEEP BACKGROUND ======= */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url('../../../images/img.jpg') no-repeat center center;
    background-size: cover;
    filter: blur(5px);
    transform: scale(1.1);
    z-index: -1;
}

header {
    padding: 18px 60px;
    background: rgba(0, 26, 85, 0.9);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h2 {
    color: white;
    margin: 0;
}

nav a {
    margin-left: 20px;
    text-decoration: none;
    color: #ffffff;
    font-weight: 600;
}

/* ======= LAYOUT ======= */
.main-layout {
    max-width: 1300px;
    margin: 120px auto 50px;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 25px;
}

/* ======= SIDEBAR ======= */
.sidebar {
    background: rgba(194, 194, 194, 0.49);
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 4px 15px rgb(0, 20, 66);
}

.lesson {
    padding: 12px;
    margin-bottom: 8px;
    background: #002b5b;
    color: #ffffff;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
}

.lesson:hover {
    background: rgba(0, 43, 91, 0.82);
}

/* ======= CONTENT ======= */
.content {
    background: rgba(183, 183, 183, 0.52);
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 4px 15px rgb(0, 20, 66);
}

iframe {
    width: 100%;
    height: 420px;
    border-radius: 12px;
}

.placeholder {
    text-align: center;
    color: #555;
    margin-top: 150px;
    font-size: 18px;
}
</style>
</head>

<body>

<!-- ======= HEADER ======= -->
<header>
    <h2>Innovation University</h2>
    <nav>
        <a href="../quizzes/physics-quiz.html">quiz</a>
         <a href="../level1-term1-video.html">Courses</a>
        <a href="../level1-term1-pdf.html">PDF</a>
        <a href="../../iu.html">Home</a>
    </nav>
</header>

<!-- ======= MAIN ======= -->
<div class="main-layout">

    <!-- Sidebar -->
    <div class="sidebar" id="lessonList">
        <h5 class="mb-3">Physics Lectures</h5>
    </div>

    <!-- Content -->
    <div class="content" id="content">
        <div class="placeholder">
            ▶️ Select a physics lecture to watch
        </div>
    </div>

</div>

<!-- ======= JS ======= -->
<script>
const lectures = [
{
    title: "01 Introduction to Physics",
    video: "https://www.youtube.com/embed/1nF6u7Kz5mY",
    desc: "Overview of physics concepts and course introduction."
},
{
    title: "02 Physical Quantities & Units",
    video: "https://www.youtube.com/embed/6n5n1x3wzYk",
    desc: "Understanding physical quantities, SI units, and measurements."
},
{
    title: "03 Motion in One Dimension",
    video: "https://www.youtube.com/embed/7M0zN5hA5nI",
    desc: "Distance, displacement, speed, velocity, and acceleration."
},
{
    title: "04 Newton's Laws of Motion",
    video: "https://www.youtube.com/embed/kKKM8Y-u7ds",
    desc: "Explanation of Newton’s three laws of motion."
},
{
    title: "05 Work, Energy & Power",
    video: "https://www.youtube.com/embed/YtX8R9m9RzQ",
    desc: "Work done by forces, kinetic & potential energy, and power."
},
{
    title: "06 Momentum & Collisions",
    video: "https://www.youtube.com/embed/W2R9kR8JxYc",
    desc: "Linear momentum, conservation law, and collisions."
},
{
    title: "07 Waves & Sound",
    video: "https://www.youtube.com/embed/ZG1ZVQ4c7qA",
    desc: "Basic concepts of waves and sound propagation."
},
{
    title: "08 Light & Optics",
    video: "https://www.youtube.com/embed/7xZz4Z7z9qU",
    desc: "Reflection, refraction, and optical instruments."
},
{
    title: "09 Electricity Basics",
    video: "https://www.youtube.com/embed/HX8pYc0M9Zk",
    desc: "Electric charge, current, voltage, and simple circuits."
}
];

const lessonList = document.getElementById("lessonList");

lectures.forEach((lec, index) => {
    const div = document.createElement("div");
    div.className = "lesson";
    div.textContent = lec.title;
    div.onclick = () => loadLecture(index);
    lessonList.appendChild(div);
});

function loadLecture(i) {
    const lec = lectures[i];
    document.getElementById("content").innerHTML = `
        <h3>${lec.title}</h3>
        <iframe src="${lec.video}" allowfullscreen></iframe>
        <p class="mt-3">${lec.desc}</p>
    `;
}
</script>

</body>
</html>
