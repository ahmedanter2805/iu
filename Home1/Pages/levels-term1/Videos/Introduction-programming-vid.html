<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Programming Videos</title>
<link href="../../../css/bootstrap.min.css" rel="stylesheet">

<style>
/* ======= KEEP BACKGROUND ======= */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url('../../../images/img.jpg') no-repeat center center;
    background-size: cover;
    filter: blur(5px);
    transform: scale(1.1);
    z-index: -1;
}

header {
            padding: 18px 60px;
            background: rgba(0, 26, 85, 0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h2 {
            color: white;
            margin: 0;
        }

        nav a {
            margin-left: 20px;
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
        }    
    
/* ======= LAYOUT ======= */
.main-layout {
    max-width: 1300px;
    margin: 120px auto 50px;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 25px;
}

/* ======= SIDEBAR ======= */
.sidebar {
    background: rgba(194, 194, 194, 0.49);
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 4px 15px rgb(0, 20, 66);
}

.lesson {
    padding: 12px;
    margin-bottom: 8px;
    background: #002b5b;
    color: #ffffff;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
}

.lesson:hover {
    background: rgba(0, 43, 91, 0.82);
}

/* ======= CONTENT ======= */
.content {
    background: rgba(183, 183, 183, 0.52);
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 4px 15px rgb(0, 20, 66);
}

iframe {
    width: 100%;
    height: 420px;
    border-radius: 12px;
}

.placeholder {
    text-align: center;
    color: #555;
    margin-top: 150px;
    font-size: 18px;
}
</style>
</head>

<body>

<!-- ======= HEADER (زي ما هو) ======= -->
<header>
    <h2>Innovation University</h2>
    <nav>
        <a href="../quizzes/programing-quiz.html">quiz</a>
        <a href="../level1-term1-video.html">Courses</a>
        <a href="../level1-term1-pdf.html">PDF</a>
        <a href="../../iu.html">Home</a>
    </nav>
</header>

<!-- ======= MAIN ======= -->
<div class="main-layout">

    <!-- Sidebar -->
    <div class="sidebar" id="lessonList">
        <h5 class="mb-3">Programming Lectures</h5>
    </div>

    <!-- Content -->
    <div class="content" id="content">
        <div class="placeholder">
            ▶️ Select a lecture to watch
        </div>
    </div>

</div>

<!-- ======= JS ======= -->
<script>
const lectures = [
{
    title: "01 Introduction to C#",
    video: "https://www.youtube.com/embed/CxGTRLkXUYg",
    desc: "Introduction to programming and C# basics."
},
{
    title: "02 Install Visual Studio",
    video: "https://www.youtube.com/embed/NQE7UMZc0tE",
    desc: "Installing and configuring Visual Studio."
},
{
    title: "03 First C# Program",
    video: "https://www.youtube.com/embed/eKo7wvCnvjM",
    desc: "Creating your first Hello World application."
},
{
    title: "04 Input & Output",
    video: "https://www.youtube.com/embed/ji4Sz529lhA",
    desc: "Reading and writing values from console."
},
{
    title: "05 Variables & Data Types",
    video: "https://www.youtube.com/embed/mhZH1EuIM9E",
    desc: "Understanding variables and data types."
},
{
    title: "06 String Type",
    video: "https://www.youtube.com/embed/RVJ2C_I9Myo",
    desc: "Working with string variables."
},
{
    title: "07 Operators",
    video: "https://www.youtube.com/embed/L9ZEdKXhAOI",
    desc: "Common operators in C#."
},
{
    title: "08 Nullable Types",
    video: "https://www.youtube.com/embed/PXIkCbaqxTM",
    desc: "Nullable data types explained."
},
{
    title: "09 Type Conversion",
    video: "https://www.youtube.com/embed/MZns_z4pUtg",
    desc: "Converting between data types."
}
];

const lessonList = document.getElementById("lessonList");

lectures.forEach((lec, index) => {
    const div = document.createElement("div");
    div.className = "lesson";
    div.textContent = lec.title;
    div.onclick = () => loadLecture(index);
    lessonList.appendChild(div);
});

function loadLecture(i) {
    const lec = lectures[i];
    document.getElementById("content").innerHTML = `
        <h3>${lec.title}</h3>
        <iframe src="${lec.video}" allowfullscreen></iframe>
        <p class="mt-3">${lec.desc}</p>
    `;
}
</script>

</body>
</html>
