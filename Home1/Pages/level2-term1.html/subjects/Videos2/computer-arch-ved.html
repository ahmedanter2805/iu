<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Computer Architecture Videos</title>
<link href="../../../../css/bootstrap.min.css" rel="stylesheet">
<style>
body::before
 {content: "";
 position: fixed; 
inset:0; background: url('../../../../images/img.jpg') no-repeat center center;
 background-size: cover;
 filter: blur(5px);
 transform: scale(1.1);
 z-index: -1;}
header {padding: 18px 60px;
 background: rgba(0, 26, 85, 0.9); 
display:flex; 
justify-content: space-between;
 align-items:center;
}

header h2 
{color:white; 
margin:0;}

nav a 
{ 
 margin-left:20px;
 text-decoration:none;
 color:white;
 font-weight:600;
}

.main-layout
 {
 max-width:1300px;
 margin:120px auto 50px;
 display:grid;
 grid-template-columns:280px 1fr; 
 gap:25px;
}

.sidebar 
{background: rgba(194, 194, 194, 0.49); 
border-radius:15px; 
padding:15px;
 box-shadow:0 4px 15px rgb(0, 20, 66);
}
.lesson 
{
padding:12px;
 margin-bottom:8px;
 background:#002b5b;
 color:white;
 border-radius:10px; 
cursor:pointer;
font-size:14px;
}
.lesson:hover 
{
background: rgba(0,43,91,0.82);
}
.content 
{background: rgba(183, 183, 183, 0.52); 
border-radius:15px; 
padding:25px;
 box-shadow:0 4px 15px rgb(0,20,66);
}

iframe

 {width:100%;
 height:420px; 
border-radius:12px;}

.placeholder
 {
 text-align:center; 
 color:#555;
 margin-top:150px;
 font-size:18px;
}
</style>
</head>
<body>

<header>
    <h2>Innovation University</h2>
    <nav>

             <a href="../quizzes2/computer-arcitectur-quiz.html">Quiz</a>
     <a href="../../level2-term1-video.html">Courses</a>
        <a href="../../level2-term1-pdf.html">PDF</a>
        <a href="../../../iu.html">Home</a>

    </nav>
</header>

<div class="main-layout">
<div class="sidebar" id="lessonList">
<h5 class="mb-3">Computer Architecture Lectures</h5>
</div>

<div class="content" id="content">
<div class="placeholder">▶️ Select a lecture to watch</div>
</div>
</div>

<script>
const lectures = [
{title:"Lecture 1 – Computer Organization", video:"https://www.youtube.com/embed/video1", desc:"Understanding CPU, memory and registers."},
{title:"Lecture 2 – Instruction Set Architecture", video:"https://www.youtube.com/embed/video2", desc:"Learn about machine instructions."},
{title:"Lecture 3 – Pipelining", video:"https://www.youtube.com/embed/video3", desc:"CPU instruction pipelining explained."},
{title:"Lecture 4 – Cache Memory", video:"https://www.youtube.com/embed/video4", desc:"Memory hierarchy and cache concepts."},
{title:"Lecture 5 – Input/Output Systems", video:"https://www.youtube.com/embed/video5", desc:"Interfacing and peripherals."}
];

const lessonList=document.getElementById("lessonList");
lectures.forEach((lec,index)=>{
const div=document.createElement("div"); div.className="lesson"; div.textContent=lec.title; div.onclick=()=>loadLecture(index); lessonList.appendChild(div);
});
function loadLecture(i){ const lec=lectures[i]; document.getElementById("content").innerHTML=`<h3>${lec.title}</h3>
<iframe src="${lec.video}" allowfullscreen></iframe><p class="mt-3">${lec.desc}</p>`;}
</script>

</body>
</html>
