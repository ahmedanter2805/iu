<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Attendance Dashboard | Innovation University</title>
  
  <link rel="icon" type="image/png" href="../images/iu-logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    /* Local specific overrides for admin attendance */
    .controls {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .controls input,
    .controls select {
      flex: 1;
      min-width: 150px;
      padding: 12px 15px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.05);
      color: #fff;
      outline: none;
    }

    .controls input:focus, .controls select:focus {
        border-color: var(--accent);
    }

    .timeline {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 15px;
      padding: 20px;
      margin-top: 30px;
    }

    .timeline h4 {
      margin-bottom: 15px;
      color: var(--accent);
    }

    .timeline ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .timeline li {
      padding: 12px 0;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .timeline li:last-child {
      border-bottom: none;
    }

    tr.present-row { background: rgba(34, 197, 94, 0.05); }
    tr.absent-row { background: rgba(239, 68, 68, 0.05); }

    .action-btns {
        display: flex;
        gap: 5px;
        justify-content: center;
    }

    .action-btns button {
        padding: 5px 10px;
        font-size: 0.8rem;
    }
  </style>
</head>

<body class="lms-theme">

  <div id="preloader"><div class="spinner"></div></div>

  <header>
      <div class="nav-container">
          <div class="logo">
              <img src="../images/iu-logo.png" alt="IU Logo">
              <span>IU | Admin Portal</span>
          </div>
          <div class="menu-icon" id="menuToggle"><i class="fas fa-bars"></i></div>
          <nav id="navMenu">
              <a href="iu.html">Home</a>
              <a href="dashboard-admin.html">Dashboard</a>
              <a href="admin-attendance.html" class="active">Attendance</a>
              <a href="login.html" class="btn-premium btn-accent">Logout <i class="fas fa-sign-out-alt"></i></a>
          </nav>
      </div>
  </header>

  <main class="main-content">

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px;">
      <h1 class="text-gold" style="margin: 0;">Admin Attendance</h1>
    </div>

    <!-- Stats -->
    <div class="grid-stats">
      <div class="glass-card stat-card">
        <div class="stat-info"><h3>Total Students</h3><div class="value" id="totalStudents">0</div></div>
        <div class="icon-box"><i class="fas fa-users"></i></div>
      </div>
      <div class="glass-card stat-card">
        <div class="stat-info"><h3>Present Today</h3><div class="value" id="presentToday" style="color: #22c55e;">0</div></div>
        <div class="icon-box"><i class="fas fa-check-circle" style="color: #22c55e;"></i></div>
      </div>
      <div class="glass-card stat-card">
        <div class="stat-info"><h3>Absent Today</h3><div class="value" id="absentToday" style="color: #ef4444;">0</div></div>
        <div class="icon-box"><i class="fas fa-times-circle" style="color: #ef4444;"></i></div>
      </div>
      <div class="glass-card stat-card">
        <div class="stat-info"><h3>Overall Attendance</h3><div class="value" id="percent">0%</div></div>
        <div class="icon-box"><i class="fas fa-chart-pie"></i></div>
      </div>
    </div>

    <div class="glass-card section-card">
      
      <div class="controls">
        <input id="search" placeholder="Search Student ID / Name" oninput="renderTable()">
        <input type="date" id="date">
        <select id="type">
          <option>Lecture</option>
          <option>Section</option>
        </select>
        
        <div style="display: flex; gap: 10px; align-items: center;">
            <button class="btn-premium btn-accent" style="background: rgba(34,197,94,0.2); color: #22c55e; border-color: #22c55e;" onclick="mark(true)"><i class="fas fa-check"></i> Mark Present</button>
            <button class="btn-premium btn-accent" style="background: rgba(239,68,68,0.2); color: #ef4444; border-color: #ef4444;" onclick="mark(false)"><i class="fas fa-times"></i> Mark Absent</button>
            <button class="btn-premium btn-primary" onclick="exportPDF()"><i class="fas fa-file-pdf"></i> Export PDF</button>
        </div>
      </div>

      <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Date</th>
                <th>Type</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
      </div>

      <!-- Timeline -->
      <div class="timeline">
        <h4><i class="fas fa-history"></i> Recent Activities</h4>
        <ul id="recentList"></ul>
      </div>

    </div>
  </main>

  <footer>© 2026 Innovation University — All Rights Reserved. Built for Excellence.</footer>

  <script src="../js/style.js"></script>
  <script>
    // Navbar Toggle
    const menuToggle = document.getElementById('menuToggle');
    const navMenu = document.getElementById('navMenu');
    if (menuToggle && navMenu) {
        menuToggle.addEventListener('click', () => navMenu.classList.toggle('active'));
    }

    // Preloader
    window.addEventListener('load', () => {
        const preloader = document.getElementById('preloader');
        if (preloader) {
            setTimeout(() => {
                preloader.style.opacity = '0';
                setTimeout(() => preloader.style.display = 'none', 500);
            }, 800);
        }
    });

    let students = [
      { id: "25030087", name: "Shahd Alaa" },
      { id: "25030410", name: "Ibrahim Lotfi" },
      { id: "25030418", name: "Adham Mohamed" }
    ];
    let records = [];

    function renderStats() {
      document.getElementById('totalStudents').innerText = students.length;
      let p = records.filter(r => r.s).length;
      let a = records.filter(r => !r.s).length;
      document.getElementById('presentToday').innerText = p;
      document.getElementById('absentToday').innerText = a;
      document.getElementById('percent').innerText = records.length ? Math.round((p / records.length) * 100) + "%" : "0%";
    }

    function renderTable() {
      let tbody = document.getElementById('tbody');
      tbody.innerHTML = "";
      let searchInput = document.getElementById('search');
      let q = searchInput.value.toLowerCase();
      
      records.filter(r => r.id.includes(q) || r.name.toLowerCase().includes(q))
        .forEach((r, i) => {
          let statusHtml = `<span class="status-pill status-${r.s ? 'completed' : 'pending'}" style="background: ${r.s ? 'rgba(34,197,94,0.1)' : 'rgba(239,68,68,0.1)'}; color: ${r.s ? '#22c55e' : '#ef4444'};">${r.s ? 'Present' : 'Absent'}</span>`;
          
          tbody.innerHTML += `
           <tr class="${r.s ? 'present-row' : 'absent-row'}">
            <td>${r.id}</td>
            <td>${r.name}</td>
            <td>${r.date}</td>
            <td>${r.type}</td>
            <td>${statusHtml}</td>
            <td>
              <div class="action-btns">
                  <button class="btn-premium btn-accent" style="background: #f59e0b; border: none; color: #fff;" onclick="toggleStatus(${i})"><i class="fas fa-edit"></i></button>
                  <button class="btn-premium btn-accent" style="background: #ef4444; border: none; color: #fff;" onclick="del(${i})"><i class="fas fa-trash"></i></button>
              </div>
            </td>
           </tr>
          `;
        });
      renderStats();
      renderTimeline();
    }

    function mark(present) {
      let searchInput = document.getElementById('search');
      let dateInput = document.getElementById('date');
      let typeInput = document.getElementById('type');
      
      let id = searchInput.value.trim();
      if (!id) return;
      
      let student = students.find(s => s.id == id || s.name.toLowerCase() == id.toLowerCase());
      if (!student) return alert("Student not found");
      
      let today = new Date().toISOString().split('T')[0];
      
      records.push({
        id: student.id,
        name: student.name,
        date: dateInput.value || today,
        type: typeInput.value,
        s: present
      });
      renderTable();
    }

    function toggleStatus(i) {
      records[i].s = !records[i].s;
      renderTable();
    }

    function del(i) {
      if (!confirm("Are you sure you want to delete this record?")) return;
      records.splice(i, 1);
      renderTable();
    }

    function exportPDF() {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF();
      pdf.setFontSize(16);
      pdf.text("Attendance Report - Innovation University", 20, 20);
      
      let y = 40;
      pdf.setFontSize(12);
      
      if(records.length === 0) {
          pdf.text("No attendance records found.", 20, y);
      } else {
          records.forEach((r, i) => {
            if (y > 280) {
                pdf.addPage();
                y = 20;
            }
            pdf.text(`${r.id} | ${r.name} | ${r.date} | ${r.type} | ${r.s ? 'Present' : 'Absent'}`, 20, y);
            y += 10;
          });
      }
      pdf.save("attendance-report.pdf");
    }

    function renderTimeline() {
      let recentList = document.getElementById("recentList");
      recentList.innerHTML = "";
      records.slice(-5).reverse().forEach(r => {
        const li = document.createElement("li");
        let statusHtml = `<span class="status-pill status-${r.s ? 'completed' : 'pending'}" style="background: ${r.s ? 'rgba(34,197,94,0.1)' : 'rgba(239,68,68,0.1)'}; color: ${r.s ? '#22c55e' : '#ef4444'};">${r.s ? 'Present' : 'Absent'}</span>`;
        li.innerHTML = `<span><i class="far fa-calendar-check"></i> ${r.date} - <strong>${r.name}</strong> (${r.type})</span>${statusHtml}`;
        recentList.appendChild(li);
      });
    }

    // Pre-populate some records for demo
    window.addEventListener('DOMContentLoaded', () => {
        let today = new Date().toISOString().split('T')[0];
        records.push({ id: "25030087", name: "Shahd Alaa", date: today, type: "Lecture", s: true });
        records.push({ id: "25030410", name: "Ibrahim Lotfi", date: today, type: "Lecture", s: true });
        renderTable();
    });
  </script>
</body>
</html>
