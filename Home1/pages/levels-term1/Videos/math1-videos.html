<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Math1 Videos</title>
<link href="../../../css/bootstrap.min.css" rel="stylesheet">

<style>
/* ======= KEEP BACKGROUND ======= */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url('../../../images/img.jpg') no-repeat center center;
    background-size: cover;
    filter: blur(5px);
    transform: scale(1.1);
    z-index: -1;
}

header {
    padding: 18px 60px;
    background: rgba(0, 26, 85, 0.9);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h2 {
    color: white;
    margin: 0;
}

nav a {
    margin-left: 20px;
    text-decoration: none;
    color: #ffffff;
    font-weight: 600;
}

.main-layout {
    max-width: 1300px;
    margin: 120px auto 50px;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 25px;
}

/* ======= SIDEBAR ======= */
.sidebar {
    background: rgba(194, 194, 194, 0.49);
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 4px 15px rgb(0, 20, 66);
}

.lesson {
    padding: 12px;
    margin-bottom: 8px;
    background: #002b5b;
    color: #ffffff;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
}

.lesson:hover {
    background: rgba(0, 43, 91, 0.82);
}

/* ======= CONTENT ======= */
.content {
    background: rgba(183, 183, 183, 0.52);
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 4px 15px rgb(0, 20, 66);
}

iframe {
    width: 100%;
    height: 420px;
    border-radius: 12px;
}

.placeholder {
    text-align: center;
    color: #555;
    margin-top: 150px;
    font-size: 18px;
}
</style>
</head>

<body>

<header>
    <h2>Innovation University</h2>
    <nav>
        <a href="../quizzes/math1-quiz.html">quiz</a>
        <a href="../level1-term1-video.html">Courses</a>
        <a href="../level1-term1-pdf.html">PDF</a>
         <a href="../../iu.html">Home</a>
    </nav>
</header>

<div class="main-layout">

    <!-- Sidebar -->
    <div class="sidebar" id="lessonList">
        <h5 class="mb-3">Math1 Lectures</h5>
    </div>

    <!-- Content -->
    <div class="content" id="content">
        <div class="placeholder">
            ▶️ Select a lecture to watch
        </div>
    </div>

</div>

<script>
const lectures = [
    { title: "01 – Introduction to Calculus & Functions", video: "https://www.youtube.com/embed/EJkxkfgZ_yY", desc: "Overview of calculus and functions." },
    { title: "02 – Domain & Range", video: "https://www.youtube.com/embed/09wg9Pgpa6c", desc: "Understanding the domain and range of functions." },
    { title: "03 – Polynomial Functions", video: "https://www.youtube.com/embed/_a2_RqTI0vs", desc: "Introduction to polynomial functions." },
    { title: "04 – Some Functions & Graphs", video: "https://www.youtube.com/embed/y8BYQmVM-zo", desc: "Plotting and analyzing functions." },
    { title: "05 – Limits", video: "https://www.youtube.com/embed/yywfUe84z6E", desc: "Basics of limits in calculus." },
    { title: "06 – Differentiation of Functions", video: "https://www.youtube.com/embed/RZYAZu5P-S8", desc: "Introduction to derivatives." },
    { title: "07 – Application of Differentiation", video: "https://www.youtube.com/embed/mYqci04Xoc8", desc: "Practical examples using derivatives." },
    { title: "08 – Indefinite Integrals", video: "https://www.youtube.com/embed/1VwCICA-Dus", desc: "Learn about indefinite integrals." },
    { title: "09 – Integration Techniques", video: "https://www.youtube.com/embed/1VPabrVyG-E", desc: "Techniques for integrating functions." },
    { title: "10 – Definite Integral Applications", video: "https://www.youtube.com/embed/VjTekYr1tuU", desc: "Applications of definite integrals." }
];

const lessonList = document.getElementById("lessonList");

lectures.forEach((lec, index) => {
    const div = document.createElement("div");
    div.className = "lesson";
    div.textContent = lec.title;
    div.onclick = () => loadLecture(index);
    lessonList.appendChild(div);
});

function loadLecture(i) {
    const lec = lectures[i];
    document.getElementById("content").innerHTML = `
        <h3>${lec.title}</h3>
        <iframe src="${lec.video}" allowfullscreen></iframe>
        <p class="mt-3">${lec.desc}</p>
    `;
}
</script>

</body>
</html>
