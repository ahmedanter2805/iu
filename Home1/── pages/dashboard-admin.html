<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Academic Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../images/iu-logo.png" />
    <style>
        :root {
            --bg-color: #1a1c24;
            --card-bg: #242731;
            --text-main: #ffffff;
            --text-secondary: #ffffff;
            --accent-blue: #4facfe;
            --accent-green: #00f2fe;
            --accent-orange: #f093fb;
        }

        body {
            margin: 0;
            padding: 30px;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            position: relative;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url('../images/img.jpg') center / cover no-repeat;
            filter: blur(3px);
            transform: scale(1.1);
            z-index: -1;
            opacity: 0.33;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: auto auto;
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Stats Cards */
        .stat-card {
            background: rgba(0, 0, 0, 0.17);
            backdrop-filter: blur(35px);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(0, 242, 254, 0.84);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-info h3 {
            font-size: 14px;
            color: var(--text-secondary);
            margin: 0;
        }

        .stat-info .value {
            font-size: 32px;
            font-weight: bold;
            margin: 5px 0;
        }

        .icon-box {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        /* Charts */
        .chart-card {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(35px);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.21);
        }

        .chart-card h4 {
            margin-top: 0;
            color: var(--text-secondary);
        }

        .full-width {
            grid-column: 1 / -1;
        }

        /* Table Style */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            text-align: left;
            color: var(--text-secondary);
            padding: 12px;
            border-bottom: 1px solid #3d404d;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #3d404d;
        }

        .status-pill {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .completed {
            background: rgba(0, 242, 254, 0.19);
            color: #00f2fe;
        }

        .pending {
            background: rgba(240, 147, 251, 0.2);
            color: #f093fb;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Academic Project Dashboard</h1>
    </div>

    <div class="dashboard-grid">
        <div class="stat-card" style="border-bottom: 3px solid var(--accent-blue);">
            <div class="stat-info">
                <h3>Total Students</h3>
                <div class="value">150</div>
            </div>
            <div class="icon-box" style="background: rgba(79, 172, 254, 0.1); color: var(--accent-blue);">
                <i class="fas fa-users"></i>
            </div>
        </div>

        <div class="stat-card" style="border-bottom: 3px solid var(--accent-green);">
            <div class="stat-info">
                <h3>Submitted Tasks</h3>
                <div class="value">120</div>
            </div>
            <div class="icon-box" style="background: rgba(0, 242, 254, 0.1); color: var(--accent-green);">
                <i class="fas fa-check-circle"></i>
            </div>
        </div>

        <div class="stat-card" style="border-bottom: 3px solid var(--accent-orange);">
            <div class="stat-info">
                <h3>Pending Tasks</h3>
                <div class="value">30</div>
            </div>
            <div class="icon-box" style="background: rgba(240, 147, 251, 0.1); color: var(--accent-orange);">
                <i class="fas fa-clock"></i>
            </div>
        </div>

        <div class="chart-card">
            <h4>Success Rate</h4>
            <canvas id="doughnutChart"></canvas>
        </div>

        <div class="chart-card" style="grid-column: span 2;">
            <div style="display: flex; justify-content: space-between;">
                <h4>Student Engagement</h4>
                <button
                    style="background: #3d404d; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer;">Download
                    PDF</button>
            </div>
            <canvas id="lineChart" height="120"></canvas>
        </div>

        <div class="chart-card full-width">
            <h4>Recent Assignments</h4>
            <table>
                <thead>
                    <tr>
                        <th>Task Name</th>
                        <th>Subject</th>
                        <th>Deadline</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Web Dashboard Design</td>
                        <td>UI/UX Class</td>
                        <td>Oct 25, 2023</td>
                        <td><span class="status-pill completed">Completed</span></td>
                    </tr>
                    <tr>
                        <td>Database Schema</td>
                        <td>Backend Dev</td>
                        <td>Oct 30, 2023</td>
                        <td><span class="status-pill pending">Pending</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Doughnut Chart
        const ctx1 = document.getElementById('doughnutChart').getContext('2d');
        new Chart(ctx1, {
            type: 'doughnut',
            data: {
                labels: ['Passed', 'Failed'],
                datasets: [{
                    data: [85, 15],
                    backgroundColor: ['#00f2fe', '#f093fb'],
                    borderWidth: 0,
                    hoverOffset: 10
                }]
            },
            options: { cutout: '80%', plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
        });

        // Line Chart
        const ctx2 = document.getElementById('lineChart').getContext('2d');
        const gradient = ctx2.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(79, 172, 254, 0.4)');
        gradient.addColorStop(1, 'rgba(79, 172, 254, 0)');

        new Chart(ctx2, {
            type: 'line',
            data: {
                labels: ['Sat', 'Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri'],
                datasets: [{
                    label: 'Study Hours',
                    data: [5, 12, 8, 20, 15, 25, 22],
                    borderColor: '#4facfe',
                    backgroundColor: gradient,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 5
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: '#3d404d' }, ticks: { color: '#a0a0a0' } },
                    x: { grid: { display: false }, ticks: { color: '#a0a0a0' } }
                }
            }
        });
    </script>
</body>

</html>
